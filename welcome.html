<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>TIMP – Welcome</title>
  <link rel="stylesheet" href="styles.css" />

  <style>
    .yt-bg{
      position: fixed;
      inset: 0;
      z-index: -2;
      overflow: hidden;
      pointer-events: none;
      background: #000;
    }
    .yt-bg iframe{
      position: absolute;
      top: 50%;
      left: 50%;
      width: 140vw;
      height: 140vh;
      transform: translate(-50%, -50%);
      border: 0;
    }
    .yt-bg::after{
      content:"";
      position:absolute;
      inset:0;
      background: rgba(0,0,0,.58);
    }
    .welcomeShell{
      min-height: calc(100vh - 72px);
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 24px;
      text-align:center;
    }
    .welcomeCard{
      width: min(980px, 100%);
      padding: 22px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(0,0,0,.28);
      backdrop-filter: blur(10px);
    }
    .welcomeCard h1{ margin:0 0 10px 0; }
    .welcomeCard p{ color: var(--muted); line-height:1.7; margin:0; }
    .ctaRow{
      display:flex;
      gap:10px;
      justify-content:center;
      flex-wrap:wrap;
      margin-top:14px;
    }
  </style>
</head>

<body>
  <!-- Background video -->
  <div class="yt-bg" aria-hidden="true">
    <iframe
      src="https://www.youtube.com/embed/7vj2c8CliH8?autoplay=1&mute=1&controls=0&rel=0&modestbranding=1&playsinline=1&loop=1&playlist=7vj2c8CliH8"
      allow="autoplay; encrypted-media; picture-in-picture"
      referrerpolicy="strict-origin-when-cross-origin"
      title="TIMP background video">
    </iframe>
  </div>

  <!-- Topbar (NO Pause/Play button here) -->
  <div class="topbar" style="justify-content:flex-end;">
    <div class="pills">
      <a class="pill" href="index.html"><small>Home</small></a>

      <div class="pill">
        <small>Region</small>&nbsp;<select id="regionSel"></select>
      </div>

      <div class="pill">
        <small>Language</small>&nbsp;
        <select id="langSel">
          <option value="en">English</option>
          <option value="fr">Français</option>
          <option value="ar">العربية</option>
          <option value="pt">Português</option>
        </select>
      </div>
    </div>
  </div>

  <main class="welcomeShell">
    <div class="welcomeCard">
      <h1>Welcome to Afreximbank: Trade and Investment Management Portal (TIMP)</h1>
      <p>
        A single access point for events, curated opportunities, deal discovery, and structured investor engagement.
      </p>

      <div class="ctaRow">
        <a href="register.html"><button>Register</button></a>

        <!-- Open Portal only if registered on this browser -->
        <a href="public.html#events">
          <button class="secondary" id="openPortalBtn" style="display:none;">Open Portal</button>
        </a>

        <a href="admin.html"><button class="secondary">Admin Console</button></a>
      </div>

      <div style="margin-top:10px;">
        <small class="muted">Tip: Register once on this browser to unlock “Open Portal” (demo access control).</small>
      </div>
    </div>
  </main>

  <script src="data.js"></script>
  <script src="util.js"></script>
  <script src="app.js"></script>
  <script src="auth.js"></script>

  <script>
    // Fill region selector
    const regionSel = document.getElementById("regionSel");
    if (regionSel && window.TIMP_REGIONS) {
      TIMP_REGIONS.forEach(r => {
        const opt = document.createElement("option");
        opt.value = r.id;
        opt.textContent = (r.name && (r.name[pickLang()] || r.name.en)) ? (r.name[pickLang()] || r.name.en) : r.id;
        regionSel.appendChild(opt);
      });
    }
    if (typeof initTopbar === "function") initTopbar();

    // Open Portal button only for authed users
    const authed = (window.TIMP_AUTH && typeof TIMP_AUTH.isAuthed === "function") ? TIMP_AUTH.isAuthed() : false;
    const openBtn = document.getElementById("openPortalBtn");
    if(openBtn) openBtn.style.display = authed ? "inline-block" : "none";
  </script>
</body>
</html>
