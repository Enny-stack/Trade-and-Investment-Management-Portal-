<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>TIMP – Welcome</title>
  <link rel="stylesheet" href="styles.css" />

  <style>
    /* Full-screen background video layer */
    .bgVideo{
      position: fixed;
      inset: 0;
      z-index: -1;          /* always behind page content */
      overflow: hidden;
      background: #000;
      pointer-events: none; /* prevents any pause/play UI interactions */
    }

    /* Make the YouTube iframe behave like a cover background */
    .bgVideo iframe{
      position: absolute;
      top: 50%;
      left: 50%;
      width: 120vw;
      height: 120vh;
      transform: translate(-50%, -50%);
      border: 0;
      pointer-events: none;
      filter: saturate(1.05) brightness(0.85);
    }

    /* Dark overlay for readability */
    .bgOverlay{
      position:absolute;
      inset:0;
      background:
        radial-gradient(900px 500px at 30% 20%, rgba(255,255,255,0.10), transparent 60%),
        linear-gradient(180deg, rgba(0,0,0,0.25), rgba(0,0,0,0.65));
    }

    /* Centered title only */
    .welcomeMain{
      min-height: calc(100vh - 72px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
  </style>
</head>

<body>
  <!-- Background video (YouTube via API) -->
  <div class="bgVideo" aria-hidden="true">
    <div id="ytBg"></div>
    <div class="bgOverlay"></div>
  </div>

  <!-- Topbar -->
  <div class="topbar" style="justify-content:flex-end;">
    <div class="pills">
      <a class="pill" href="index.html"><small>Home</small></a>

      <div class="pill">
        <small>Region</small>&nbsp;<select id="regionSel"></select>
      </div>

      <div class="pill">
        <small>Language</small>&nbsp;
        <select id="langSel">
          <option value="en">English</option>
          <option value="fr">Français</option>
          <option value="ar">العربية</option>
          <option value="pt">Português</option>
        </select>
      </div>
    </div>
  </div>

  <!-- Centered welcome content (ONLY the title) -->
  <main class="welcomeMain">
    <div>
      <h1 style="margin:0;">
        Welcome to Afreximbank: Trade and Investment Management Portal (TIMP)
      </h1>
    </div>
  </main>

  <script src="data.js"></script>
  <script src="util.js"></script>
  <script src="app.js"></script>
  <script src="auth.js"></script>

  <script>
    // Fill region selector
    const regionSel = document.getElementById("regionSel");
    if (regionSel && window.TIMP_REGIONS) {
      TIMP_REGIONS.forEach(r => {
        const opt = document.createElement("option");
        opt.value = r.id;
        opt.textContent = (r.name && (r.name[pickLang()] || r.name.en))
          ? (r.name[pickLang()] || r.name.en)
          : r.id;
        regionSel.appendChild(opt);
      });
    }
    if (typeof initTopbar === "function") initTopbar();
  </script>

  <script>
    // Load YouTube Iframe API
    (function(){
      const tag = document.createElement("script");
      tag.src = "https://www.youtube.com/iframe_api";
      document.head.appendChild(tag);
    })();

    const YT_VIDEO_ID = "7vj2c8CliH8";
    let ytPlayer = null;

    function onYouTubeIframeAPIReady() {
      ytPlayer = new YT.Player("ytBg", {
        videoId: YT_VIDEO_ID,
        playerVars: {
          autoplay: 1,
          mute: 1,
          controls: 0,
          playsinline: 1,
          modestbranding: 1,
          rel: 0,
          iv_load_policy: 3,
          disablekb: 1,
          fs: 0,

          // Loop trick: playlist is required for loop to work reliably
          loop: 1,
          playlist: YT_VIDEO_ID
        },
        events: {
          onReady: (e) => {
            try {
              e.target.mute();
              e.target.playVideo();
            } catch(err) {}
          },
          onStateChange: (e) => {
            // Force replay instantly when ended (minimizes end-screen flash)
            if (e.data === YT.PlayerState.ENDED) {
              try {
                e.target.seekTo(0, true);
                e.target.playVideo();
              } catch(err) {}
            }
          }
        }
      });
    }
  </script>
</body>
</html>
