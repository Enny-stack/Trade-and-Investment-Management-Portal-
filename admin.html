    }

      function saveDeals(deals){
        localStorage.setItem("timp_deals", JSON.stringify(deals || []));
      }
    }
    if(typeof getRegistrations !== "function"){
      function getRegistrations(){
        const x = JSON.parse(localStorage.getItem("timp_regs") || "null");
        return Array.isArray(x) ? x : (window.TIMP_DATA?.registrations || []);

    /* =========================
       Region Profiles storage (Admin authoring)
       - Public portal reads this via keys:
         timp_region_profiles / timp_regionprofiles / timp_regionStore
       ========================= */
    const RP_KEY = "timp_region_profiles";

    function rp_all(){
      try{
        const x = JSON.parse(localStorage.getItem(RP_KEY) || "null");
        return Array.isArray(x) ? x : [];
      }catch(e){ return []; }
    }
    function rp_saveAll(rows){
      localStorage.setItem(RP_KEY, JSON.stringify(rows || []));
    }
    function rp_normRegionKey(v){
      const s = String(v || "").toLowerCase().trim();
      if(!s) return "";
      if(s === "south" || s.includes("southern")) return "southern";
      if(s.includes("north")) return "north";
      if(s.includes("west")) return "west";
      if(s.includes("central") || s.includes("centre")) return "central";
      if(s.includes("east")) return "east";
      return s;
    }
    function rp_pickLangContent(profile, lang){
      if(!profile || typeof profile !== "object") return {};
      const c = profile.content || {};
      if(c && typeof c === "object" && c[lang]) return c[lang];
      if(c && typeof c === "object" && c.en) return c.en;
      return {};
    }
    function rp_get(regionId){
      const rid = rp_normRegionKey(regionId);
      const all = rp_all();
      return all.find(p => rp_normRegionKey(p.region || p.region_id || p.regionKey || p.id) === rid) || null;
    }
    function rp_upsertContent(regionId, lang, content, opts){
      const rid = rp_normRegionKey(regionId);
      const all = rp_all();
      let p = rp_get(rid);

      if(!p){
        p = {
          id: "rp_" + rid,
          region: rid,
          status: "Draft",
          published: false,
          visibility: "Private",
          updatedAt: "",
          content: { en:{}, fr:{}, ar:{}, pt:{} }
        };
        all.push(p);
      }

      p.region = rid;
      p.content = p.content && typeof p.content === "object" ? p.content : { en:{}, fr:{}, ar:{}, pt:{} };
      p.content[lang] = {
        title: content.title || "",
        subtitle: content.subtitle || "",
        overview: content.overview || "",
        keySectors: content.keySectors || "",
        incentives: content.incentives || "",
        risks: content.risks || "",
        tags: Array.isArray(content.tags) ? content.tags : []
      };

      if(opts && opts.status){
        p.status = opts.status;
        // keep published flag consistent with status
        if(String(opts.status).toLowerCase() === "published"){
          p.published = true;
          p.visibility = "Public";
        }else{
          p.published = false;
          p.visibility = "Private";
        }
      }

      p.updatedAt = new Date().toISOString();
      rp_saveAll(all);
      return p;
    }
    function rp_publish(regionId){
      const rid = rp_normRegionKey(regionId);
      const all = rp_all();
      const p = rp_get(rid) || rp_upsertContent(rid, "en", {}, {status:"Draft"});
      p.status = "Published";
      p.published = true;
      p.visibility = "Public";
      p.updatedAt = new Date().toISOString();
      rp_saveAll(all);
      return p;
    }
    function rp_unpublish(regionId){
      const rid = rp_normRegionKey(regionId);
      const all = rp_all();
      const p = rp_get(rid);
      if(!p) return null;
      p.status = "Draft";
      p.published = false;
      p.visibility = "Private";
      p.updatedAt = new Date().toISOString();
      rp_saveAll(all);
      return p;
    }

    /* =========================
       Small helpers
       ========================= */
    function escapeHtml(s){
      return String(s || "")
        .replace(/&/g,"&amp;")
        .replace(/</g,"&lt;")
        .replace(/>/g,"&gt;")
        .replace(/"/g,"&quot;")
        .replace(/'/g,"&#39;");
    }
    function splitName(full){
      const t = String(full || "").trim().replace(/\s+/g, " ");
      if(!t) return { first_name:"", last_name:"" };
      const parts = t.split(" ");
      if(parts.length === 1) return { first_name: parts[0], last_name: "" };
      return { first_name: parts.slice(0, -1).join(" "), last_name: parts.slice(-1)[0] };
    }
    function humanFileSize(bytes){
      const b = Number(bytes || 0);
      if(!b) return "0 B";
      const u = ["B","KB","MB","GB"];
      let i = 0, x = b;
      while(x >= 1024 && i < u.length-1){ x/=1024; i++; }
      return `${x.toFixed(i===0?0:1)} ${u[i]}`;
    }

    /* =========================

      $("#pageMeta").innerHTML = `<span class="tag ok">${regionLabel(pickRegion())}</span> <span class="tag muted">Event profiling + publishing (demo)</span>`;
      $("#pageActions").innerHTML = `

        <button class="secondary" onclick="setToast('Invite link generated', 'Demo: Registration link + invitation email automation.')">Generate invite link</button>
      `;

      const evs = adminFilter(getEvents());
      const rows = evs.map(e=>`
        <tr>
          <td><b>${e.title}</b><br><small>${e.type} • ${e.venue}</small></td>
          <td>${e.date}</td>
          <td><span class="tag ${e.status==='Published'?'ok':'warn'}">${e.status}</span></td>
          <td class="row-actions">
            <button class="secondary" onclick="editEvent('${e.id}')">Edit</button>
            <button class="danger" onclick="deleteEvent('${e.id}')">Delete</button>

      $("#pageBody").innerHTML = `

            <p>Admins add venue, date/time, theme, banner, and upload programme/presentations.</p>

            <select id="evRegion" style="width:100%">
              ${(window.TIMP_REGIONS||[]).map(r=>`<option value="${r.id}">${regionLabel(r.id)}</option>`).join("")}
            </select>

            <label>Title</label><input id="evTitle" value="New Investment Forum (demo)" style="width:100%" />
            <div style="height:10px"></div>

            <div class="grid cols-2">
              <div><label>Type</label><select id="evType" style="width:100%"><option>Investment Forum</option><option>Roadshow</option></select></div>
              <div><label>Venue</label><input id="evVenue" value="Abidjan" style="width:100%" /></div>
            </div>
            <div style="height:10px"></div>

            <div class="grid cols-2">
              <div><label>Date</label><input id="evDate" type="date" value="2026-07-15" style="width:100%" /></div>
              <div><label>Time</label><input id="evTime" value="10:00" style="width:100%" /></div>
            </div>
            <div style="height:10px"></div>

            <label>Theme</label><input id="evTheme" value="Capital mobilisation + value chains" style="width:100%" />
            <div style="height:10px"></div>

            <div class="hr"></div>

            <input type="file" id="evBanner" accept="image/*" />

            <label>Invitation Email (demo template)</label>
            <textarea id="evInviteTpl" rows="4" style="width:100%" placeholder="Subject + Body... (demo template)"></textarea>

            <div class="row-actions">
              <button class="secondary" onclick="copyInviteLink()">Copy registration link</button>
              <button class="secondary" onclick="downloadInviteList()">Download invite list (CSV)</button>
              <button class="secondary" onclick="openMailClient()">Open email draft</button>

            <label>Programme (PDF)</label><input type="file" id="evProgramme" accept="application/pdf" />

          <div class="card">
            <h2>Events (Admin view)</h2>

              <thead><tr><th>Event</th><th>Date</th><th>Status</th><th>Actions</th></tr></thead>

    function clearEventForm(){
      $("#evId").value = "";
      $("#evTitle").value = "";
      $("#evVenue").value = "";
      $("#evTheme").value = "";
      $("#evType").value = "Investment Forum";
      $("#evDate").value = "";
      $("#evTime").value = "";
      $("#evInviteTpl").value = "";
      $("#evRecordingUrl").value = "";
      if($("#evBanner")) $("#evBanner").value = "";
      if($("#evProgramme")) $("#evProgramme").value = "";
      if($("#evDeck")) $("#evDeck").value = "";
      setToast("Cleared", "Event form reset (demo).");
    }

    function saveEvent(){
      const id = ($("#evId").value || "").trim();

      const base = {
        id: id || ("e" + Date.now()),
        region: $("#evRegion").value,
        title: ($("#evTitle").value || "").trim(),
        type: $("#evType").value,
        venue: ($("#evVenue").value || "").trim(),
        date: $("#evDate").value,
        time: ($("#evTime").value || "").trim(),
        theme: ($("#evTheme").value || "").trim(),
        invite_tpl: ($("#evInviteTpl").value || "").trim(),
        recording_url: ($("#evRecordingUrl").value || "").trim(),
        programme_name: $("#evProgramme")?.files?.[0]?.name || "",
        deck_name: $("#evDeck")?.files?.[0]?.name || ""
      };

      if(!base.title || !base.venue || !base.date){
        setToast("Missing fields", "Title, Venue and Date are required.");
        return;
      }

      const bannerFile = $("#evBanner")?.files?.[0] || null;

      const events = getEvents();
      const idx = events.findIndex(e=>e.id===base.id);
      const existing = (idx >= 0) ? events[idx] : null;

      const existingStatus = existing?.status ? existing.status : "Draft";
      const status = (existingStatus === "Published") ? "Published" : "Draft";

      function finalizeSave(bannerDataUrl){
        const eventToSave = {
          ...existing,
          ...base,
          status,
          banner_data_url: bannerDataUrl || existing?.banner_data_url || ""
        };

        if(idx >= 0) events[idx] = eventToSave;
        else events.push(eventToSave);

        saveEvents(events);
        setToast("Saved", `Event saved (${status}).`);
        renderEventManager();
        editEvent(eventToSave.id);
      }

      if(bannerFile){
        const reader = new FileReader();
        reader.onload = ()=> finalizeSave(String(reader.result || ""));
        reader.readAsDataURL(bannerFile);
      } else {
        finalizeSave(null);
      }
    }

    function publishEvent(){
      const id = ($("#evId").value || "").trim();
      if(!id) return setToast("Missing", "Save the event first.");

      const events = getEvents();
      const i = events.findIndex(e=>e.id===id);
      if(i < 0) return setToast("Not found", "Event not found.");

      events[i].status = "Published";
      saveEvents(events);

      setToast("Published", "Event is now visible on Public (demo).");
      renderEventManager();
      editEvent(id);
    }

    function editEvent(id){
      const e = getEvents().find(x=>x.id===id);
      if(!e) return;

      $("#evId").value = e.id;
      $("#evRegion").value = e.region || ((pickRegion()==="non_reg") ? "north" : pickRegion());
      $("#evTitle").value = e.title || "";
      $("#evVenue").value = e.venue || "";
      $("#evTheme").value = e.theme || "";
      $("#evType").value = e.type || "Investment Forum";
      $("#evDate").value = e.date || "";
      $("#evTime").value = e.time || "";
      $("#evInviteTpl").value = e.invite_tpl || "";
      $("#evRecordingUrl").value = e.recording_url || "";

      setToast("Editing", "Loaded event into editor.");
    }

    function deleteEvent(id){
      const events = getEvents().filter(e=>e.id!==id);
      saveEvents(events);
      setToast("Deleted", "Event removed (demo).");
      renderEventManager();
    }

    function copyInviteLink(){
      const id = ($("#evId").value || "").trim();
      const link = "public.html#events"; // demo route
      const text = `${link} (event id: ${id || "not saved yet"})`;

      if(navigator.clipboard && navigator.clipboard.writeText){
        navigator.clipboard.writeText(text).then(()=>{
          setToast("Copied", "Invite link copied (demo).");
        }).catch(()=>{
          setToast("Copy failed", text);
        });
      } else {
        setToast("Copy link", text);
      }
    }

    function downloadInviteList(){
      const evId = ($("#evId")?.value || "").trim();
      if(!evId) return setToast("Select event", "Click Edit on an event first, then download.");

      const events = getEvents();
      const ev = events.find(e=>e.id===evId);
      const regs = getRegistrations().filter(r => r.event_id === evId);

      const rows = regs.map(r=>{
        const nm = (!r.first_name && !r.last_name && r.name) ? splitName(r.name) : null;
        const first = r.first_name || nm?.first_name || "";
        const last  = r.last_name  || nm?.last_name  || "";
        return {
          Event: ev ? ev.title : evId,
          Salutation: r.salutation || "",
          FirstName: first,
          LastName: last,
          Organisation: r.org || "",
          Position: r.position || r.title || "",
          Email: r.email || "",
          Phone: r.phone || "",
          Status: r.state || "Pending"
        };
      });

      const headers = ["Event","Salutation","FirstName","LastName","Organisation","Position","Email","Phone","Status"];
      const csv = [
        headers.join(","),
        ...rows.map(o=>headers.map(h=>`"${String(o[h]||"").replace(/"/g,'""')}"`).join(","))
      ].join("\n");

    function exportRegistrationsCsv(){
      const events = getEvents();
      const regsAll = getRegistrations();

      const regs = regsAll.filter(r=>{
        const ev = events.find(e=>e.id===r.event_id);
        if(!ev) return (pickRegion()==="non_reg");
        return (pickRegion()==="non_reg" || ev.region===pickRegion());
      });

      const rows = regs.map(r=>{
        const ev = events.find(e=>e.id===r.event_id);
        const nm = (!r.first_name && !r.last_name && r.name) ? splitName(r.name) : null;
        const first = r.first_name || nm?.first_name || "";
        const last  = r.last_name  || nm?.last_name  || "";
        return {
          Event: ev ? ev.title : r.event_id,
          Salutation: r.salutation || "",
          FirstName: first,
          LastName: last,
          Organisation: r.org || "",
          Position: r.position || r.title || "",
          Email: r.email || "",
          Phone: r.phone || "",
          Status: r.state || "Pending"
        };
      });

      const headers = Object.keys(rows[0]||{
        Event:"",Salutation:"",FirstName:"",LastName:"",Organisation:"",Position:"",Email:"",Phone:"",Status:""
      });

      const csv = [
        headers.join(","),
        ...rows.map(o=>headers.map(h=>`"${String(o[h] ?? "").replace(/"/g,'""')}"`).join(","))
      ].join("\n");

      const blob = new Blob([csv], {type:"text/csv;charset=utf-8"});
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "registrations_export.csv";
      a.click();

      setToast("Exported", "CSV downloaded. Open with Excel.");
    }

    function approve(id){

      saveRegistrations(r);
      setToast("Approved", "Participant approved (demo).");
      renderRegistrations();
      renderDashboard();

    function reject(id){

      renderDashboard();

    function doSearch(){ const q = ($("#q").value || "").toLowerCase().trim(); const hits=[]; const evs=adminFilter(getEvents()); evs.forEach(e=>{ if([e.title,e.theme,e.venue,e.type,e.date].join(" ").toLowerCase().includes(q)) hits.push({type:"Event",label:e.title+" • "+e.date}); }); const deals=adminFilter(getDeals()); deals.forEach(d=>{ if([d.country,d.sector,(d.summary||""),d.stage].join(" ").toLowerCase().includes(q)) hits.push({type:"Deal",label:d.country+" • "+d.sector+" • "+fmtMoney(d.ticket_usd_m)}); }); $("#results").innerHTML = hits.length ? `<ul style="margin:0; padding-left:18px; color:var(--muted); line-height:1.55">${hits.map(h=>`<li><b>${escapeHtml(h.type)}:</b> ${escapeHtml(h.label)}</li>`).join("")}</ul>` : `<small>No results.</small>`; }

    /* =========================
       Routing
       ========================= */
    function route(){
      const h = location.hash || "#dashboard";
      if(h.startsWith("#dashboard")) renderDashboard();
      else if(h.startsWith("#events")) renderEventManager();
      else if(h.startsWith("#regs")) renderRegistrations();
      else if(h.startsWith("#dealbook")) renderDealBook();
      else if(h.startsWith("#deals")) renderDealsManager();     // NOTE: keep your full function in file
      else if(h.startsWith("#expo")) renderExpoAdmin();         // NOTE: keep your full function in file
      else if(h.startsWith("#matchmaking")) renderMatchmaking();
      else if(h.startsWith("#regionprofiles")) renderRegionProfiles();
      else if(h.startsWith("#rbac")) renderRBAC();
      else if(h.startsWith("#analytics")) renderAnalytics();
      else if(h.startsWith("#archive")) renderArchive();
      else renderDashboard();
    }

    window.addEventListener("hashchange", route);
    route();
  </script>
