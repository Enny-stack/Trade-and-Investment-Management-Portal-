<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>TIMP – Admin Console</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="topbar">
    <div class="brand">
      <div class="logo"></div>
      <div>
        <div class="i18n" data-key="admin">Admin Console</div>
        <span class="sub i18n" data-key="timp">Trade & Investment Management Portal (TIMP)</span>
      </div>
    </div>
    <div class="pills">
      <a class="pill" href="index.html"><small>Home</small></a>
      <div class="pill"><small class="i18n" data-key="region">Region</small>&nbsp;<select id="regionSel"></select></div>
      <div class="pill"><small class="i18n" data-key="language">Language</small>&nbsp;
        <select id="langSel">
          <option value="en">English</option>
          <option value="fr">Français</option>
          <option value="ar">العربية</option>
          <option value="pt">Português</option>
        </select>
      </div>
    </div>
  </div>

  <div class="layout">
    <aside class="sidebar">
      <div class="navtitle">Admin</div>
      <nav class="nav" id="sidebarNav">
        <a href="#dashboard" data-nav="dashboard"><span>Dashboard</span></a>
        <a href="#events" data-nav="events"><span class="i18n" data-key="create_event">Create / Edit Event</span></a>
        <a href="#regs" data-nav="registrations"><span class="i18n" data-key="registrations">Registrations</span><span class="badge" id="regCount"></span></a>

        <a href="#dealbook" data-nav="dealbook"><span class="i18n" data-key="dealbook">Deal Book</span></a>
        <a href="#deals" data-nav="deals"><span>Deals</span></a>

        <!-- ✅ NEW: Virtual Exhibition Admin -->
        <a href="#expoadmin" data-nav="expoadmin"><span class="i18n" data-key="exhibition">Virtual Exhibition</span></a>

        <a href="#matchmaking" data-nav="matchmaking"><span class="i18n" data-key="matchmaking">Matchmaking</span></a>
        <a href="#regionprofiles" data-nav="region_profiles"><span class="i18n" data-key="region_profiles">Region Profiles</span></a>
        <a href="#rbac" data-nav="users_rbac"><span class="i18n" data-key="users_rbac">Users & RBAC</span></a>
        <a href="#analytics" data-nav="analytics"><span class="i18n" data-key="analytics">Analytics</span></a>
        <a href="#archive" data-nav="archive"><span class="i18n" data-key="archive">Archive</span></a>
      </nav>

      <div class="navtitle">Shortcut</div>
      <nav class="nav">
        <a href="public.html"><span>Switch to Public</span><span class="badge">demo</span></a>
        <a href="walkthrough.html"><span>Demo Script</span></a>
      </nav>
    </aside>

    <main class="main">
      <div class="hero">
        <h1 id="pageTitle">Admin Dashboard</h1>
        <div class="meta" id="pageMeta"></div>
        <div class="row" id="pageActions"></div>
      </div>

      <div id="pageBody" style="margin-top:14px;"></div>
    </main>
  </div>

  <div class="toast" id="toast">
    <b id="toastTitle"></b>
    <div id="toastMsg"></div>
  </div>

  <script src="data.js"></script>
  <script src="util.js"></script>
  <script src="app.js"></script>

  <script>
    // -----------------------------
    // Region selector
    // -----------------------------
    const regionSel = document.getElementById("regionSel");
    TIMP_REGIONS.forEach(r=>{
      const opt = document.createElement("option");
      opt.value = r.id;
      opt.textContent = r.name[pickLang()] || r.name.en;
      regionSel.appendChild(opt);
    });
    initTopbar();

    function setActive(navKey){
      $$("#sidebarNav a").forEach(a=>a.classList.remove("active"));
      const match = $(`#sidebarNav a[data-nav="${navKey}"]`);
      if(match) match.classList.add("active");
    }

    function adminFilter(items){
      return filterByRegion(items);
    }

    // -----------------------------
    // ✅ Fallback storage helpers (if util.js doesn't have them)
    // -----------------------------
    window.getBooths = window.getBooths || function(){
      try{
        const x = JSON.parse(localStorage.getItem("timp_booths"));
        if(Array.isArray(x)) return x;
      }catch(e){}
      return (window.TIMP_DATA && TIMP_DATA.booths) ? TIMP_DATA.booths : [];
    };

    window.saveBooths = window.saveBooths || function(rows){
      localStorage.setItem("timp_booths", JSON.stringify(rows));
    };

    // Helper: download from dataUrl
    function downloadDataUrl(filename, dataUrl){
      if(!dataUrl) return setToast("Missing", "No file stored (demo).");
      const a = document.createElement("a");
      a.href = dataUrl;
      a.download = filename || "download.pdf";
      document.body.appendChild(a);
      a.click();
      a.remove();
    }

    // -----------------------------
    // DASHBOARD
    // -----------------------------
    function renderDashboard(){
      setActive("dashboard");
      $("#pageTitle").textContent = "Admin Dashboard";
      $("#pageMeta").innerHTML = `<span class="tag ok">${regionLabel(pickRegion())}</span> <span class="tag muted">KPIs snapshot (demo)</span>`;
      $("#pageActions").innerHTML = ``;

      const events = getEvents();
      const evs = adminFilter(events);

      const regsAll = getRegistrations();
      const regs = regsAll.filter(r=>{
        const ev = events.find(e=>e.id===r.event_id);
        if(!ev) return (pickRegion()==="non_reg");
        return (pickRegion()==="non_reg" || ev.region===pickRegion());
      });

      if ($("#regCount")) $("#regCount").textContent = regs.length;

      const deals = adminFilter(getDeals());

      $("#pageBody").innerHTML = `
        <div class="grid cols-3">
          <div class="card">
            <div class="mini"><div><div class="label">Events this year</div><div class="big">${evs.length}</div></div><span class="tag ok">Calendar</span></div>
            <div class="hr"></div>
            <small>Centralized annual visibility across roadshows & forums.</small>
          </div>
          <div class="card">
            <div class="mini"><div><div class="label">Registrations</div><div class="big">${regs.length}</div></div><span class="tag warn">Workflow</span></div>
            <div class="hr"></div>
            <small>Approve/reject; then unlock controlled materials access (demo).</small>
          </div>
          <div class="card">
            <div class="mini"><div><div class="label">Active opportunities</div><div class="big">${deals.length}</div></div><span class="tag ok">Pipeline</span></div>
            <div class="hr"></div>
            <small>Track stages + investor “warmth” signals.</small>
          </div>
        </div>

        <div style="height:14px"></div>

        <div class="grid cols-2">
          <div class="card">
            <h2>Quick Actions</h2>
            <div class="row-actions">
              <button onclick="location.hash='#events'">Create Event</button>
              <button class="secondary" onclick="location.hash='#regs'">Approve Registrations</button>
              <button class="secondary" onclick="location.hash='#dealbook'">Generate Deal Book</button>
              <button class="secondary" onclick="location.hash='#analytics'">View Analytics</button>
            </div>
          </div>

          <div class="card">
            <h2>Security posture (demo)</h2>
            <p>RBAC controls publishing, approvals, uploads, and access to sensitive pitch decks.</p>
            <div class="hr"></div>
            <span class="tag ok">RBAC</span>
            <span class="tag ok">Secure data rooms</span>
            <span class="tag warn">SSO in real build</span>
          </div>
        </div>
      `;
    }

    // -----------------------------
    // EVENTS (kept as-is from your file)
    // -----------------------------
    function renderEventManager(){
      setActive("events");
      $("#pageTitle").textContent = t("create_event");
      $("#pageMeta").innerHTML = `<span class="tag ok">${regionLabel(pickRegion())}</span> <span class="tag muted">Event profiling + publishing (demo)</span>`;
      $("#pageActions").innerHTML = `
        <button onclick="publishEvent()">Publish</button>
        <button class="secondary" onclick="setToast('Invite link generated', 'Demo: Registration link + invitation email automation.')">Generate invite link</button>
      `;

      const evs = adminFilter(getEvents());
      const rows = evs.map(e=>`
        <tr>
          <td><b>${e.title}</b><br><small>${e.type} • ${e.venue}</small></td>
          <td>${e.date}</td>
          <td><span class="tag ${e.status==='Published'?'ok':'warn'}">${e.status}</span></td>
          <td class="row-actions">
            <button class="secondary" onclick="editEvent('${e.id}')">Edit</button>
            <button class="danger" onclick="deleteEvent('${e.id}')">Delete</button>
          </td>
        </tr>
      `).join("");

      $("#pageBody").innerHTML = `
        <div class="grid cols-2">
          <div class="card">
            <h2>Event Profile Builder</h2>
            <p>Admins add venue, date/time, theme, banner, and upload programme/presentations.</p>

            <div class="hr"></div>

            <input type="hidden" id="evId" value="" />

            <label>Region</label>
            <select id="evRegion" style="width:100%">
              ${TIMP_REGIONS.map(r=>`<option value="${r.id}">${regionLabel(r.id)}</option>`).join("")}
            </select>
            <div style="height:10px"></div>

            <label>Title</label><input id="evTitle" value="New Investment Forum (demo)" style="width:100%" />
            <div style="height:10px"></div>

            <div class="grid cols-2">
              <div><label>Type</label><select id="evType" style="width:100%"><option>Investment Forum</option><option>Roadshow</option></select></div>
              <div><label>Venue</label><input id="evVenue" value="Abidjan" style="width:100%" /></div>
            </div>
            <div style="height:10px"></div>

            <div class="grid cols-2">
              <div><label>Date</label><input id="evDate" type="date" value="2026-07-15" style="width:100%" /></div>
              <div><label>Time</label><input id="evTime" value="10:00" style="width:100%" /></div>
            </div>
            <div style="height:10px"></div>

            <label>Theme</label><input id="evTheme" value="Capital mobilisation + value chains" style="width:100%" />
            <div style="height:10px"></div>

            <div class="hr"></div>

            <div class="row-actions">
              <button class="secondary" onclick="saveEvent()">Save draft</button>
            </div>
          </div>

          <div class="card">
            <h2>Events (Admin view)</h2>
            <table class="table">
              <thead><tr><th>Event</th><th>Date</th><th>Status</th><th>Actions</th></tr></thead>
              <tbody>${rows || `<tr><td colspan="4"><small>No events for this region.</small></td></tr>`}</tbody>
            </table>
          </div>
        </div>
      `;

      const defaultRegion = (pickRegion() === "non_reg") ? "north" : pickRegion();
      if ($("#evRegion")) $("#evRegion").value = defaultRegion;
    }

    function saveEvent(){
      const id = ($("#evId").value || "").trim();

      const newEvent = {
        id: id || ("e" + Date.now()),
        region: $("#evRegion").value,
        title: ($("#evTitle").value || "").trim(),
        type: $("#evType").value,
        venue: ($("#evVenue").value || "").trim(),
        date: $("#evDate").value,
        time: ($("#evTime").value || "").trim(),
        theme: ($("#evTheme").value || "").trim()
      };

      if(!newEvent.title || !newEvent.venue || !newEvent.date){
        setToast("Missing fields", "Title, Venue and Date are required.");
        return;
      }

      const events = getEvents();
      const idx = events.findIndex(e=>e.id===newEvent.id);

      const existingStatus = (idx >= 0 && events[idx].status) ? events[idx].status : "Draft";
      const status = existingStatus === "Published" ? "Published" : "Draft";

      const eventToSave = { ...newEvent, status };

      if(idx >= 0) events[idx] = { ...events[idx], ...eventToSave };
      else events.push(eventToSave);

      saveEvents(events);

      setToast("Saved", `Event saved (${status}).`);
      renderEventManager();
      editEvent(eventToSave.id);
    }

    function publishEvent(){
      const id = ($("#evId").value || "").trim();
      if(!id) return setToast("Missing", "Save the event first.");

      const events = getEvents();
      const i = events.findIndex(e=>e.id===id);
      if(i<0) return setToast("Not found", "Event not found.");

      events[i].status = "Published";
      saveEvents(events);

      setToast("Published", "Event is now visible on Public (demo).");
      renderEventManager();
      editEvent(id);
    }

    function editEvent(id){
      const e = getEvents().find(x=>x.id===id);
      if(!e) return;

      $("#evId").value = e.id;
      $("#evRegion").value = e.region || ((pickRegion()==="non_reg") ? "north" : pickRegion());
      $("#evTitle").value = e.title || "";
      $("#evVenue").value = e.venue || "";
      $("#evTheme").value = e.theme || "";
      $("#evType").value = e.type || "Investment Forum";
      $("#evDate").value = e.date || "";
      $("#evTime").value = e.time || "";
    }

    function deleteEvent(id){
      const events = getEvents().filter(e=>e.id!==id);
      saveEvents(events);
      setToast("Deleted", "Event removed (demo).");
      renderEventManager();
    }

    // -----------------------------
    // REGISTRATIONS (kept from your file)
    // -----------------------------
    function renderRegistrations(){
      setActive("registrations");
      $("#pageTitle").textContent = t("registrations");
      $("#pageMeta").innerHTML = `<span class="tag ok">${regionLabel(pickRegion())}</span> <span class="tag muted">Approve / reject workflow (demo)</span>`;
      $("#pageActions").innerHTML = `<button class="secondary" onclick="exportRegistrationsCsv()">Export (CSV)</button>`;

      const events = getEvents();
      const regsAll = getRegistrations();

      const regs = regsAll.filter(r=>{
        const ev = events.find(e=>e.id===r.event_id);
        if(!ev) return (pickRegion()==="non_reg");
        return (pickRegion()==="non_reg" || ev.region===pickRegion());
      });

      $("#regCount").textContent = regs.length;

      const rows = regs.map(r=>{
        const ev = events.find(e=>e.id===r.event_id);
        const evTitle = ev ? ev.title : r.event_id;

        const stateClass =
          r.state==="Approved" ? "ok" :
          r.state==="Pending" ? "warn" :
          r.state==="Rejected" ? "muted" : "muted";

        const disableApprove = r.state === "Approved";
        const disableReject = r.state === "Rejected";

        const name = (r.first_name || r.name || "") + (r.last_name ? (" " + r.last_name) : "");
        const org = r.org || "";
        const pos = r.position || r.title || "";

        return `
          <tr>
            <td><b>${name.trim()}</b><br><small>${org} • ${pos}</small></td>
            <td><small>${r.email || ""}</small></td>
            <td>${evTitle}</td>
            <td><span class="tag ${stateClass}">${r.state || "Pending"}</span></td>
            <td class="row-actions">
              <button ${disableApprove ? "disabled" : ""} onclick="approve('${r.id}')">Approve</button>
              <button class="danger" ${disableReject ? "disabled" : ""} onclick="reject('${r.id}')">Reject</button>
            </td>
          </tr>
        `;
      }).join("");

      $("#pageBody").innerHTML = `
        <div class="card">
          <h2>Registration Queue</h2>
          <p>Admin can approve/reject. Public users instantly see the updated status (same browser demo).</p>
          <table class="table">
            <thead><tr><th>Participant</th><th>Email</th><th>Event</th><th>Status</th><th>Actions</th></tr></thead>
            <tbody>${rows || `<tr><td colspan="5"><small>No registrations found for this region.</small></td></tr>`}</tbody>
          </table>
        </div>
      `;
    }

    function exportRegistrationsCsv(){
      const events = getEvents();
      const regsAll = getRegistrations();

      const regs = regsAll.filter(r=>{
        const ev = events.find(e=>e.id===r.event_id);
        if(!ev) return (pickRegion()==="non_reg");
        return (pickRegion()==="non_reg" || ev.region===pickRegion());
      });

      const rows = regs.map(r=>{
        const ev = events.find(e=>e.id===r.event_id);
        return {
          Event: ev ? ev.title : r.event_id,
          Salutation: r.salutation || "",
          FirstName: r.first_name || "",
          LastName: r.last_name || "",
          Organisation: r.org||"",
          Position: r.position || r.title || "",
          Email: r.email||"",
          Phone: r.phone || "",
          Status: r.state||"Pending"
        };
      });

      const headers = Object.keys(rows[0]||{Event:"",Salutation:"",FirstName:"",LastName:"",Organisation:"",Position:"",Email:"",Phone:"",Status:""});
      const csv = [
        headers.join(","),
        ...rows.map(o=>headers.map(h=>`"${String(o[h] ?? "").replace(/"/g,'""')}"`).join(","))
      ].join("\n");

      const blob = new Blob([csv], {type:"text/csv;charset=utf-8"});
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "registrations_export.csv";
      a.click();

      setToast("Exported", "CSV downloaded. Open with Excel.");
    }

    function approve(id){
      const r = getRegistrations();
      const i = r.findIndex(x=>x.id===id);
      if(i < 0) return setToast("Not found", "Registration not found.");
      r[i].state = "Approved";
      saveRegistrations(r);
      setToast("Approved", "Participant approved (demo).");
      renderRegistrations();
    }

    function reject(id){
      const r = getRegistrations();
      const i = r.findIndex(x=>x.id===id);
      if(i < 0) return setToast("Not found", "Registration not found.");
      r[i].state = "Rejected";
      saveRegistrations(r);
      setToast("Rejected", "Participant rejected (demo).");
      renderRegistrations();
    }

    // -----------------------------
    // DEAL BOOK (kept minimal)
    // -----------------------------
    let LAST_DEALBOOK = null;

    function downloadDealBookHtml(list, title){
      const html = `
<!doctype html><html><head><meta charset="utf-8"><title>${title}</title></head>
<body style="font-family:Arial">
  <h1>${title}</h1>
  <p>Generated: ${new Date().toISOString()}</p>
  <hr/>
  ${list.map((d,i)=>`
    <h3>${i+1}. ${d.country || ""} – ${d.sector || ""} (${fmtMoney(d.ticket_usd_m)})</h3>
    <p><b>Stage:</b> ${d.stage || ""}<br/>${d.summary || ""}</p>
    <hr/>
  `).join("")}
  <p><small>Demo: Use Print → Save as PDF.</small></p>
</body></html>`;

      const blob = new Blob([html], {type:"text/html"});
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = title.replace(/\s+/g,"_") + ".html";
      a.click();
    }

    function downloadLastDealBook(){
      if(!LAST_DEALBOOK) return setToast("Missing", "Generate a deal book first.");
      downloadDealBookHtml(LAST_DEALBOOK.list, LAST_DEALBOOK.title);
    }

    function renderDealBook(){
      setActive("dealbook");
      $("#pageTitle").textContent = t("dealbook");
      $("#pageMeta").innerHTML = `<span class="tag ok">Branded</span> <span class="tag muted">Generate by country or sector (demo)</span>`;
      $("#pageActions").innerHTML = `
        <button onclick="genDealBook()">Generate</button>
        <button class="secondary" onclick="downloadLastDealBook()">Download (HTML)</button>
      `;

      const deals = adminFilter(getDeals());
      const countries = Array.from(new Set(deals.map(d=>d.country).filter(Boolean))).sort();
      const sectors = Array.from(new Set(deals.map(d=>d.sector).filter(Boolean))).sort();

      $("#pageBody").innerHTML = `
        <div class="grid cols-2">
          <div class="card">
            <h2>Deal Book Generator</h2>
            <p>Aggregates verified opportunities into a branded PDF/digital book (demo).</p>
            <div class="hr"></div>
            <label>Filter: Country</label>
            <select id="country" style="width:100%">
              <option value="">All</option>
              ${countries.map(c=>`<option>${c}</option>`).join("")}
            </select>
            <div style="height:10px"></div>
            <label>Filter: Sector</label>
            <select id="sector" style="width:100%">
              <option value="">All</option>
              ${sectors.map(s=>`<option>${s}</option>`).join("")}
            </select>
            <div class="hr"></div>
            <button onclick="genDealBook()">Generate Deal Book</button>
            <button class="secondary" onclick="downloadLastDealBook()">Download (HTML)</button>
            <div class="hr"></div>
            <small class="muted">Open HTML → Print → Save as PDF.</small>
          </div>
          <div class="card">
            <h2>Preview (demo)</h2>
            <div id="dealPreview"><small>Select filters then click Generate.</small></div>
          </div>
        </div>
      `;
    }

    function genDealBook(){
      const deals = adminFilter(getDeals());
      const c = ($("#country")?.value || "");
      const s = ($("#sector")?.value || "");
      const outAll = deals.filter(d => (!c || d.country===c) && (!s || d.sector===s));
      const out = outAll.slice(0, 40);

      const title = `${c || "All"}_${s || "All"}_Deal_Book`;
      LAST_DEALBOOK = { list: out, title };

      const truncatedMsg = outAll.length > 40
        ? `<p><small class="muted">Showing first 40 of ${outAll.length} matches (demo cap).</small></p>`
        : ``;

      $("#dealPreview").innerHTML = `
        <p><b>Generated:</b> ${out.length} opportunities</p>
        ${truncatedMsg}
        <ul style="margin:0; padding-left:18px; color:var(--muted); line-height:1.55">
          ${out.map(d=>`<li>${d.country || ""} • ${d.sector || ""} • ${fmtMoney(d.ticket_usd_m)}</li>`).join("") || "<li>No matches.</li>"}
        </ul>
        <div class="hr"></div>
        <button onclick="downloadLastDealBook()">Download Deal Book (HTML)</button>
      `;
      setToast("Generated", "Deal book ready. Download HTML → Print → Save as PDF.");
    }

    // -----------------------------
    // ✅ DEALS MANAGER (with Prospectus upload + download)
    // -----------------------------
    function renderDealsManager(){
      setActive("deals");
      $("#pageTitle").textContent = "Deals Manager";
      $("#pageMeta").innerHTML = `<span class="tag ok">${regionLabel(pickRegion())}</span> <span class="tag muted">Add/edit opportunities (stored in browser for demo)</span>`;
      $("#pageActions").innerHTML = `
        <button onclick="addDeal()">Add Deal</button>
        <button class="secondary" onclick="resetDeals()">Reset to sample</button>
      `;

      const deals = adminFilter(getDeals());
      const allDeals = getDeals();

      const rows = deals.map(d=>`
        <tr>
          <td><b>${d.country}</b><br><small>${d.sector}</small></td>
          <td>${regionLabel(d.region)}</td>
          <td>${fmtMoney(d.ticket_usd_m)}</td>
          <td>${d.stage}</td>
          <td>${badgeWarmth(d.warmth)}</td>
          <td class="row-actions">
            <button class="secondary" onclick="loadDeal('${d.id}')">Edit</button>
            <button class="danger" onclick="deleteDeal('${d.id}')">Delete</button>
          </td>
        </tr>
      `).join("");

      const regionOpts = TIMP_REGIONS.map(r=>`<option value="${r.id}">${regionLabel(r.id)}</option>`).join("");

      $("#pageBody").innerHTML = `
        <div class="grid cols-2">
          <div class="card">
            <h2>Deal Entry</h2>
            <p>Use this to add opportunities. Data is saved in your browser (localStorage).</p>
            <div class="hr"></div>

            <input type="hidden" id="dealId" value="" />
            <input type="hidden" id="dealProspectusRemove" value="0" />

            <label>Region</label>
            <select id="dealRegion" style="width:100%">${regionOpts}</select>
            <div style="height:10px"></div>

            <label>Country</label>
            <input id="dealCountry" placeholder="e.g., Nigeria" style="width:100%" />
            <div style="height:10px"></div>

            <label>Sector</label>
            <input id="dealSector" placeholder="e.g., Energy" style="width:100%" />
            <div style="height:10px"></div>

            <label>Ticket size (USD millions)</label>

    function updateProspectusInfo(deal){
      const info = $("#prospectusInfo");

    function clearDealForm(){
      $("#dealId").value = "";
      $("#dealCountry").value = "";
      $("#dealSector").value = "";
      $("#dealTicket").value = "";
      $("#dealOwner").value = "";
      $("#dealSummary").value = "";
      $("#dealVideo").value = "";
      $("#dealStage").value = "Origination";
      $("#dealWarmth").value = "Cold";
      $("#dealProspectusRemove").value = "0";
      if($("#dealProspectus")) $("#dealProspectus").value = "";

    function loadDeal(id){
      const d = getDeals().find(x=>x.id===id);
      if(!d) return;
      $("#dealId").value = d.id;
      $("#dealRegion").value = d.region;
      $("#dealCountry").value = d.country;
      $("#dealSector").value = d.sector;
      $("#dealTicket").value = d.ticket_usd_m;
      $("#dealStage").value = d.stage;
      $("#dealWarmth").value = d.warmth;
      $("#dealOwner").value = d.owner || "";
      $("#dealSummary").value = d.summary || "";
      $("#dealVideo").value = d.video || "";
      $("#dealProspectusRemove").value = "0";
      if($("#dealProspectus")) $("#dealProspectus").value = "";
      updateProspectusInfo(d);
      setToast("Loaded", "Deal loaded for editing (demo).");
    }

    function removeCurrentProspectus(){
      $("#dealProspectusRemove").value = "1";
      setToast("Marked", "Prospectus will be removed on Save.");
    }

    function downloadCurrentProspectus(){
      const id = ($("#dealId").value || "").trim();
      if(!id) return setToast("Missing", "Load a deal first.");
      const d = getDeals().find(x=>x.id===id);
      if(!d || !d.prospectus || !d.prospectus.dataUrl) return setToast("Missing", "No prospectus stored for this deal.");
      downloadDataUrl(d.prospectus.name || "prospectus.pdf", d.prospectus.dataUrl);
    }

    function finalizeSaveDeal(deal){
      const deals = getDeals();
      const idx = deals.findIndex(x=>x.id===deal.id);
      if(idx >= 0) deals[idx] = deal; else deals.push(deal);
      saveDeals(deals);
      setToast("Saved", "Deal saved. Prospectus (if uploaded) is now downloadable on Public.");
      renderDealsManager();
      loadDeal(deal.id);
    }

    function saveDeal(){
      const id = ($("#dealId").value || "").trim();
      const existing = id ? (getDeals().find(x=>x.id===id) || null) : null;

      const deal = {
        id: id || ("d" + Date.now()),
        region: $("#dealRegion").value,
        country: ($("#dealCountry").value || "").trim(),
        sector: ($("#dealSector").value || "").trim(),
        ticket_usd_m: parseInt($("#dealTicket").value || "0", 10),
        stage: $("#dealStage").value,
        warmth: $("#dealWarmth").value,
        owner: ($("#dealOwner").value || "").trim(),
        summary: ($("#dealSummary").value || "").trim(),
        video: ($("#dealVideo").value || "").trim() || "Video pitch (demo)",
        status: (existing && existing.status) ? existing.status : "Published",
        prospectus: (existing && existing.prospectus) ? existing.prospectus : null
      };

      if(!deal.country || !deal.sector || !deal.ticket_usd_m){
        setToast("Missing fields", "Country, sector and ticket size are required in this demo.");
        return;
      }

      // remove prospectus if marked
      if($("#dealProspectusRemove").value === "1"){
        deal.prospectus = null;
      }

      // if a new PDF is selected, store it as dataUrl
      const f = $("#dealProspectus")?.files?.[0];
      if(f){
        const reader = new FileReader();
        reader.onload = ()=>{
          deal.prospectus = { name: f.name, dataUrl: String(reader.result || "") };
          $("#dealProspectusRemove").value = "0";
          finalizeSaveDeal(deal);
        };
        reader.readAsDataURL(f);
        return;
      }

      finalizeSaveDeal(deal);
    }

    function deleteDeal(id){
      const deals = getDeals().filter(d=>d.id!==id);
      saveDeals(deals);
      setToast("Deleted", "Deal removed (demo).");
      renderDealsManager();
    }

    function addDeal(){
      clearDealForm();
      setToast("New deal", "Fill the form and click Save.");
    }

    function resetDeals(){
      localStorage.removeItem("timp_deals");
      setToast("Reset", "Deals reset to sample dataset.");
      renderDealsManager();
    }

    function saveBooth(){
      const id = ($("#boothId").value || "").trim();
      const booths = getBooths();
      const existing = id ? (booths.find(x=>x.id===id) || null) : null;

      const booth = {
        id: id || ("b" + Date.now()),
        region: $("#boothRegion").value,
        org: ($("#boothOrg").value || "").trim(),
        offers: ($("#boothOffers").value || "").trim(),
        status: $("#boothStatus").value,
        catalog_file: existing ? (existing.catalog_file || null) : null
      };

      if(!booth.org){
        return setToast("Missing", "Organisation is required.");
      }

      const f = $("#boothCatalog")?.files?.[0];
      if(f){
        const reader = new FileReader();
        reader.onload = ()=>{
          booth.catalog_file = { name: f.name, dataUrl: String(reader.result || "") };
          const idx = booths.findIndex(x=>x.id===booth.id);
          if(idx>=0) booths[idx] = booth; else booths.push(booth);
          saveBooths(booths);
          setToast("Saved", "Booth saved (catalog stored). Public can now View Catalog.");
          renderExpoAdmin();
          editBooth(booth.id);
        };
        reader.readAsDataURL(f);
        return;
      }

      const idx = booths.findIndex(x=>x.id===booth.id);
      if(idx>=0) booths[idx] = booth; else booths.push(booth);
      saveBooths(booths);
      setToast("Saved", "Booth saved.");
      renderExpoAdmin();
      editBooth(booth.id);
    }

    function deleteBooth(id){

        return setToast("Missing", "No catalog stored for this booth.");

      downloadDataUrl(b.catalog_file.name || "catalog.pdf", b.catalog_file.dataUrl);
    }

    function doSearch(){
      const q = ($("#q").value || "").toLowerCase().trim();
      const hits = [];

      const evs = adminFilter(getEvents());
      evs.forEach(e=>{
        if([e.title,e.theme,e.venue,e.type,e.date].join(" ").toLowerCase().includes(q)){
          hits.push({type:"Event", label:e.title+" • "+e.date});
        }
      });

      const deals = adminFilter(getDeals());
      deals.forEach(d=>{
        if([d.country,d.sector,(d.summary||""),d.stage].join(" ").toLowerCase().includes(q)){
          hits.push({type:"Deal", label:d.country+" • "+d.sector+" • "+fmtMoney(d.ticket_usd_m)});
        }
      });

      $("#results").innerHTML = hits.length
        ? `<ul style="margin:0; padding-left:18px; color:var(--muted); line-height:1.55">${hits.map(h=>`<li><b>${h.type}:</b> ${h.label}</li>`).join("")}</ul>`
        : `<small>No results.</small>`;
    }

    // -----------------------------
    // ROUTER
    // -----------------------------
    function route(){
      const h = location.hash || "#dashboard";
      if(h.startsWith("#dashboard")) renderDashboard();
      else if(h.startsWith("#events")) renderEventManager();
      else if(h.startsWith("#regs")) renderRegistrations();
      else if(h.startsWith("#dealbook")) renderDealBook();
      else if(h.startsWith("#deals")) renderDealsManager();
      else if(h.startsWith("#expoadmin")) renderExpoAdmin();     // ✅ NEW
      else if(h.startsWith("#matchmaking")) renderMatchmaking();
      else if(h.startsWith("#regionprofiles")) renderRegionProfiles();
      else if(h.startsWith("#rbac")) renderRBAC();
      else if(h.startsWith("#analytics")) renderAnalytics();
      else if(h.startsWith("#archive")) renderArchive();
      else renderDashboard();
    }

    window.addEventListener("hashchange", route);
    route();
  </script>
