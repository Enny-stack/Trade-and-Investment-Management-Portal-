  <script>
    /* =========================================================
       Safety fallbacks (so demo works even if util.js not updated)
       ========================================================= */
    if(typeof getEvents !== "function"){
      function getEvents(){
        const x = JSON.parse(localStorage.getItem("timp_events") || "null");
        return Array.isArray(x) ? x : (TIMP_DATA.events || []);
      }
    }
    if(typeof saveEvents !== "function"){
      function saveEvents(evs){
        localStorage.setItem("timp_events", JSON.stringify(evs || []));
      }
    }
    if(typeof getDeals !== "function"){
      function getDeals(){
        const x = JSON.parse(localStorage.getItem("timp_deals") || "null");
        return Array.isArray(x) ? x : (TIMP_DATA.deals || []);
      }
    }
    if(typeof saveDeals !== "function"){
      function saveDeals(deals){
        localStorage.setItem("timp_deals", JSON.stringify(deals || []));
      }
    }
    if(typeof getRegistrations !== "function"){
      function getRegistrations(){
        const x = JSON.parse(localStorage.getItem("timp_regs") || "null");
        return Array.isArray(x) ? x : (TIMP_DATA.registrations || []);
      }
    }
    if(typeof saveRegistrations !== "function"){
      function saveRegistrations(r){
        localStorage.setItem("timp_regs", JSON.stringify(r || []));
      }
    }

    // ✅ NEW: booths storage fallback (Virtual Exhibition)
    if(typeof getBooths !== "function"){
      function getBooths(){
        const x = JSON.parse(localStorage.getItem("timp_booths") || "null");
        return Array.isArray(x) ? x : (TIMP_DATA.booths || []);
      }
    }
    if(typeof saveBooths !== "function"){
      function saveBooths(rows){
        localStorage.setItem("timp_booths", JSON.stringify(rows || []));
      }
    }

    /* =========================
       Small helpers
       ========================= */
    function escapeHtml(s){
      return String(s || "")
        .replace(/&/g,"&amp;")
        .replace(/</g,"&lt;")
        .replace(/>/g,"&gt;")
        .replace(/"/g,"&quot;")
        .replace(/'/g,"&#39;");
    }

    function splitName(full){
      const t = String(full || "").trim().replace(/\s+/g, " ");
      if(!t) return { first_name:"", last_name:"" };
      const parts = t.split(" ");
      if(parts.length === 1) return { first_name: parts[0], last_name: "" };
      return { first_name: parts.slice(0, -1).join(" "), last_name: parts.slice(-1)[0] };
    }

    function humanFileSize(bytes){
      const b = Number(bytes || 0);
      if(!b) return "0 B";
      const u = ["B","KB","MB","GB"];
      let i = 0, x = b;
      while(x >= 1024 && i < u.length-1){ x/=1024; i++; }
      return `${x.toFixed(i===0?0:1)} ${u[i]}`;
    }

    /* =========================
       Topbar init
       ========================= */
    const regionSel = document.getElementById("regionSel");
    TIMP_REGIONS.forEach(r=>{
      const opt = document.createElement("option");
      opt.value = r.id;
      opt.textContent = r.name[pickLang()] || r.name.en;
      regionSel.appendChild(opt);
    });
    initTopbar();

    function setActive(navKey){
      $$("#sidebarNav a").forEach(a=>a.classList.remove("active"));
      const match = $(`#sidebarNav a[data-nav="${navKey}"]`);
      if(match) match.classList.add("active");
    }

    function adminFilter(items){
      return filterByRegion(items);
    }

       Dashboard
       ========================= */

        const ev = events.find(e=>e.id===r.event_id);

        return (pickRegion()==="non_reg" || ev.region===pickRegion());
      });

      if ($("#regCount")) $("#regCount").textContent = regs.length;

      const deals = adminFilter(getDeals());

      $("#pageBody").innerHTML = `

          </div>

            </div>

            <p>RBAC controls who can publish events, approve registrations, upload materials, and access sensitive pitch decks.</p>
            <div class="hr"></div>
            <span class="tag ok">RBAC</span>
            <span class="tag ok">Secure data rooms</span>
            <span class="tag warn">SSO in real build</span>

    /* =========================
       Event Manager
       ========================= */
    function renderEventManager(){
      setActive("events");
      $("#pageTitle").textContent = t("create_event");
      $("#pageMeta").innerHTML = `<span class="tag ok">${regionLabel(pickRegion())}</span> <span class="tag muted">Event profiling + publishing (demo)</span>`;
      $("#pageActions").innerHTML = `
        <button onclick="publishEvent()">Publish</button>
        <button class="secondary" onclick="setToast('Invite link generated', 'Demo: Registration link + invitation email automation.')">Generate invite link</button>
      `;

      const evs = adminFilter(getEvents());
      const rows = evs.map(e=>`
        <tr>
          <td><b>${e.title}</b><br><small>${e.type} • ${e.venue}</small></td>
          <td>${e.date}</td>
          <td><span class="tag ${e.status==='Published'?'ok':'warn'}">${e.status}</span></td>
          <td class="row-actions">
            <button class="secondary" onclick="editEvent('${e.id}')">Edit</button>
            <button class="danger" onclick="deleteEvent('${e.id}')">Delete</button>
          </td>
        </tr>
      `).join("");

      $("#pageBody").innerHTML = `
        <div class="grid cols-2">
          <div class="card">
            <h2>Event Profile Builder</h2>
            <p>Admins add venue, date/time, theme, banner, and upload programme/presentations.</p>

            <div class="hr"></div>

            <input type="hidden" id="evId" value="" />

            <label>Region</label>
            <select id="evRegion" style="width:100%">
              ${TIMP_REGIONS.map(r=>`<option value="${r.id}">${regionLabel(r.id)}</option>`).join("")}
            </select>
            <div style="height:10px"></div>

            <label>Title</label><input id="evTitle" value="New Investment Forum (demo)" style="width:100%" />
            <div style="height:10px"></div>

            <div class="grid cols-2">
              <div><label>Type</label><select id="evType" style="width:100%"><option>Investment Forum</option><option>Roadshow</option></select></div>
              <div><label>Venue</label><input id="evVenue" value="Abidjan" style="width:100%" /></div>
            </div>
            <div style="height:10px"></div>

            <div class="grid cols-2">
              <div><label>Date</label><input id="evDate" type="date" value="2026-07-15" style="width:100%" /></div>
              <div><label>Time</label><input id="evTime" value="10:00" style="width:100%" /></div>
            </div>
            <div style="height:10px"></div>

            <label>Theme</label><input id="evTheme" value="Capital mobilisation + value chains" style="width:100%" />
            <div style="height:10px"></div>

            <div class="hr"></div>

            <label>Event Banner (image)</label>
            <input type="file" id="evBanner" accept="image/*" />
            <small class="muted">Demo: stored in browser and can be shown on Public.</small>

            <div style="height:10px"></div>
            <label>Invitation Email (demo template)</label>
            <textarea id="evInviteTpl" rows="4" style="width:100%" placeholder="Subject + Body... (demo template)"></textarea>

            <div class="row-actions">
              <button class="secondary" onclick="copyInviteLink()">Copy registration link</button>
              <button class="secondary" onclick="downloadInviteList()">Download invite list (CSV)</button>
              <button class="secondary" onclick="openMailClient()">Open email draft</button>
            </div>

            <div class="hr"></div>
            <h3 style="margin:0 0 8px 0;">Event Materials</h3>
            <label>Programme (PDF)</label><input type="file" id="evProgramme" accept="application/pdf" />
            <div style="height:10px"></div>
            <label>Presentations (PDF)</label><input type="file" id="evDeck" accept="application/pdf" />
            <div style="height:10px"></div>
            <label>Recording link (URL)</label><input id="evRecordingUrl" placeholder="https://..." style="width:100%" />

            <div class="hr"></div>
            <div class="row-actions">
              <button class="secondary" onclick="saveEvent()">Save draft</button>
              <button class="ghost" onclick="clearEventForm()">Clear</button>
            </div>
          </div>

          <div class="card">
            <h2>Events (Admin view)</h2>
            <table class="table">
              <thead><tr><th>Event</th><th>Date</th><th>Status</th><th>Actions</th></tr></thead>
              <tbody>${rows || `<tr><td colspan="4"><small>No events for this region.</small></td></tr>`}</tbody>
            </table>
          </div>
        </div>
      `;

      const defaultRegion = (pickRegion() === "non_reg") ? "north" : pickRegion();
      if ($("#evRegion")) $("#evRegion").value = defaultRegion;
      if ($("#evId")) $("#evId").value = "";
    }

    function clearEventForm(){
      $("#evId").value = "";
      $("#evTitle").value = "";
      $("#evVenue").value = "";
      $("#evTheme").value = "";
      $("#evType").value = "Investment Forum";
      $("#evDate").value = "";
      $("#evTime").value = "";
      $("#evInviteTpl").value = "";
      $("#evRecordingUrl").value = "";
      if($("#evBanner")) $("#evBanner").value = "";
      if($("#evProgramme")) $("#evProgramme").value = "";
      if($("#evDeck")) $("#evDeck").value = "";
      setToast("Cleared", "Event form reset (demo).");
    }

    function saveEvent(){
      const id = ($("#evId").value || "").trim();

      const base = {
        id: id || ("e" + Date.now()),
        region: $("#evRegion").value,
        title: ($("#evTitle").value || "").trim(),
        type: $("#evType").value,
        venue: ($("#evVenue").value || "").trim(),
        date: $("#evDate").value,
        time: ($("#evTime").value || "").trim(),
        theme: ($("#evTheme").value || "").trim(),
        invite_tpl: ($("#evInviteTpl").value || "").trim(),
        recording_url: ($("#evRecordingUrl").value || "").trim(),
        programme_name: $("#evProgramme")?.files?.[0]?.name || "",
        deck_name: $("#evDeck")?.files?.[0]?.name || ""
      };

      if(!base.title || !base.venue || !base.date){
        setToast("Missing fields", "Title, Venue and Date are required.");
        return;
      }

      const bannerFile = $("#evBanner")?.files?.[0] || null;

      const events = getEvents();
      const idx = events.findIndex(e=>e.id===base.id);
      const existing = (idx >= 0) ? events[idx] : null;

      const existingStatus = existing?.status ? existing.status : "Draft";
      const status = (existingStatus === "Published") ? "Published" : "Draft";

      function finalizeSave(bannerDataUrl){
        const eventToSave = {
          ...existing,
          ...base,
          status,
          banner_data_url: bannerDataUrl || existing?.banner_data_url || ""
        };

        if(idx >= 0) events[idx] = eventToSave;
        else events.push(eventToSave);

        saveEvents(events);
        setToast("Saved", `Event saved (${status}).`);
        renderEventManager();
        editEvent(eventToSave.id);
      }

      if(bannerFile){
        const reader = new FileReader();
        reader.onload = ()=> finalizeSave(String(reader.result || ""));
        reader.readAsDataURL(bannerFile);
      } else {
        finalizeSave(null);
      }
    }

    function publishEvent(){
      const id = ($("#evId").value || "").trim();
      if(!id) return setToast("Missing", "Save the event first.");

      const events = getEvents();
      const i = events.findIndex(e=>e.id===id);
      if(i < 0) return setToast("Not found", "Event not found.");

      events[i].status = "Published";
      saveEvents(events);

      setToast("Published", "Event is now visible on Public (demo).");
      renderEventManager();
      editEvent(id);
    }

    function editEvent(id){
      const e = getEvents().find(x=>x.id===id);
      if(!e) return;

      $("#evId").value = e.id;
      $("#evRegion").value = e.region || ((pickRegion()==="non_reg") ? "north" : pickRegion());
      $("#evTitle").value = e.title || "";
      $("#evVenue").value = e.venue || "";
      $("#evTheme").value = e.theme || "";
      $("#evType").value = e.type || "Investment Forum";
      $("#evDate").value = e.date || "";
      $("#evTime").value = e.time || "";
      $("#evInviteTpl").value = e.invite_tpl || "";
      $("#evRecordingUrl").value = e.recording_url || "";

      setToast("Editing", "Loaded event into editor.");
    }

    function deleteEvent(id){
      const events = getEvents().filter(e=>e.id!==id);
      saveEvents(events);
      setToast("Deleted", "Event removed (demo).");
      renderEventManager();
    }

    /* Simple invite helpers (demo) */
    function copyInviteLink(){
      const id = ($("#evId").value || "").trim();
      const link = "public.html#events"; // demo route
      const text = `${link} (event id: ${id || "not saved yet"})`;

      if(navigator.clipboard && navigator.clipboard.writeText){
        navigator.clipboard.writeText(text).then(()=>{
          setToast("Copied", "Invite link copied (demo).");
        }).catch(()=>{
          setToast("Copy failed", text);
        });
      } else {
        setToast("Copy link", text);
      }
    }

    // ✅ UPDATED: exports registrations for the selected event (the real "invite list")
    function downloadInviteList(){
      const evId = ($("#evId")?.value || "").trim();
      if(!evId) return setToast("Select event", "Click Edit on an event first, then download.");

      const events = getEvents();
      const ev = events.find(e=>e.id===evId);

      const regs = getRegistrations().filter(r => r.event_id === evId);

      const rows = regs.map(r=>{
        // support old data that used r.name
        const nm = (!r.first_name && !r.last_name && r.name) ? splitName(r.name) : null;
        const first = r.first_name || nm?.first_name || "";
        const last  = r.last_name  || nm?.last_name  || "";

        return {
          Event: ev ? ev.title : evId,
          Salutation: r.salutation || "",
          FirstName: first,
          LastName: last,
          Organisation: r.org || "",
          Position: r.position || r.title || "",
          Email: r.email || "",
          Phone: r.phone || "",
          Status: r.state || "Pending"
        };
      });

      const headers = ["Event","Salutation","FirstName","LastName","Organisation","Position","Email","Phone","Status"];
      const csv = [
        headers.join(","),
        ...rows.map(o=>headers.map(h=>`"${String(o[h]||"").replace(/"/g,'""')}"`).join(","))
      ].join("\n");

      const blob = new Blob([csv], {type:"text/csv;charset=utf-8"});
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = `invite_list_${(ev?.title||evId).replace(/\s+/g,"_")}.csv`;
      a.click();

      setToast("Downloaded", "Invite list CSV downloaded (open with Excel).");
    }

    function openMailClient(){
      const id = ($("#evId").value || "").trim();
      const title = ($("#evTitle").value || "Event").trim();
      const tpl = ($("#evInviteTpl").value || "").trim();

      const subject = encodeURIComponent(`Invitation: ${title}`);
      const body = encodeURIComponent(
        (tpl ? tpl : `Dear [Name],\n\nYou are invited to ${title}.\n\nRegister here: public.html#events\n\nRegards,\nTIMP Admin`)
        + (id ? `\n\n(Event ID: ${id})` : "")
      );

      window.location.href = `mailto:?subject=${subject}&body=${body}`;
    }

    /* =========================
       Registrations
       ========================= */
    function renderRegistrations(){
      setActive("registrations");
      $("#pageTitle").textContent = t("registrations");
      $("#pageMeta").innerHTML = `<span class="tag ok">${regionLabel(pickRegion())}</span> <span class="tag muted">Approve / reject workflow (demo)</span>`;
      $("#pageActions").innerHTML = `<button class="secondary" onclick="exportRegistrationsCsv()">Export (CSV)</button>`;

      const events = getEvents();
      const regsAll = getRegistrations();

      const regs = regsAll.filter(r=>{
        const ev = events.find(e=>e.id===r.event_id);
        if(!ev) return (pickRegion()==="non_reg");
        return (pickRegion()==="non_reg" || ev.region===pickRegion());
      });

      $("#regCount").textContent = regs.length;

      const rows = regs.map(r=>{
        const ev = events.find(e=>e.id===r.event_id);
        const evTitle = ev ? ev.title : r.event_id;

        const nm = (!r.first_name && !r.last_name && r.name) ? splitName(r.name) : null;
        const first = r.first_name || nm?.first_name || "";
        const last  = r.last_name  || nm?.last_name  || "";
        const sal = (r.salutation || "").trim();
        const displayName = [sal, first, last].filter(Boolean).join(" ").trim() || (r.name || "");

        const state = (r.state || "Pending");
        const stateClass =
          state==="Approved" ? "ok" :
          state==="Pending" ? "warn" :
          state==="Rejected" ? "muted" : "muted";

        const disableApprove = state === "Approved";
        const disableReject = state === "Rejected";

        return `
          <tr>
            <td>
              <b>${escapeHtml(displayName)}</b><br>
              <small>${escapeHtml(r.org || "")} • ${escapeHtml(r.position || r.title || "")}</small>
              ${r.phone ? `<br><small class="muted">${escapeHtml(r.phone)}</small>` : ``}
            </td>
            <td><small>${escapeHtml(r.email || "")}</small></td>
            <td>${escapeHtml(evTitle)}</td>
            <td><span class="tag ${stateClass}">${escapeHtml(state)}</span></td>
            <td class="row-actions">
              <button ${disableApprove ? "disabled" : ""} onclick="approve('${r.id}')">Approve</button>
              <button class="danger" ${disableReject ? "disabled" : ""} onclick="reject('${r.id}')">Reject</button>
            </td>
          </tr>
        `;
      }).join("");

      $("#pageBody").innerHTML = `
        <div class="card">
          <h2>Registration Queue</h2>
          <p>Admin can approve/reject, then participants gain controlled access to published materials and recordings.</p>
          <table class="table">
            <thead><tr><th>Participant</th><th>Email</th><th>Event</th><th>Status</th><th>Actions</th></tr></thead>
            <tbody>${rows || `<tr><td colspan="5"><small>No registrations found for this region.</small></td></tr>`}</tbody>
          </table>
        </div>
      `;
    }

    function exportRegistrationsCsv(){
      const events = getEvents();
      const regsAll = getRegistrations();

      const regs = regsAll.filter(r=>{
        const ev = events.find(e=>e.id===r.event_id);
        if(!ev) return (pickRegion()==="non_reg");
        return (pickRegion()==="non_reg" || ev.region===pickRegion());
      });

      const rows = regs.map(r=>{
        const ev = events.find(e=>e.id===r.event_id);
        const nm = (!r.first_name && !r.last_name && r.name) ? splitName(r.name) : null;
        const first = r.first_name || nm?.first_name || "";
        const last  = r.last_name  || nm?.last_name  || "";
        return {
          Event: ev ? ev.title : r.event_id,
          Salutation: r.salutation || "",
          FirstName: first,
          LastName: last,
          Organisation: r.org || "",
          Position: r.position || r.title || "",

    function attachProspectus(){
      const id = ($("#dealId")?.value || "").trim();
      if(!id) return setToast("Save first", "Save the deal first, then attach a prospectus.");

      const f = $("#dealProspectus")?.files?.[0];
      if(!f) return setToast("Missing", "Choose a PDF file first.");

      if(f.type !== "application/pdf"){
        return setToast("Invalid file", "Please upload a PDF prospectus.");
      }

      // Demo guardrail for localStorage size
      const MAX_STORE_BYTES = 1_500_000; // ~1.5MB safe-ish
      const deals = getDeals();
      const idx = deals.findIndex(x=>x.id===id);
      if(idx < 0) return setToast("Not found", "Deal not found.");

      deals[idx].prospectus_name = f.name;
      deals[idx].prospectus_mime = f.type;
      deals[idx].prospectus_size = f.size;
      deals[idx].prospectus_updated_at = new Date().toISOString();

      if(f.size > MAX_STORE_BYTES){
        deals[idx].prospectus_data = ""; // store name only
        saveDeals(deals);
        updateProspectusStatusUi();
        setToast("Attached (name only)", `PDF is ${humanFileSize(f.size)} — too large for demo storage. Stored filename only.`);
        return;
      }

      const reader = new FileReader();
      reader.onload = ()=>{
        deals[idx].prospectus_data = String(reader.result || ""); // data:application/pdf;base64,...
        saveDeals(deals);
        updateProspectusStatusUi();
        setToast("Attached", "Prospectus stored and ready for Public download (demo).");
      };
      reader.onerror = ()=>{
        setToast("Error", "Could not read the PDF (demo).");
      };
      reader.readAsDataURL(f);
    }

    function downloadProspectus(){
      const id = ($("#dealId")?.value || "").trim();
      if(!id) return setToast("No deal", "Load a deal first.");

      const d = getDeals().find(x=>x.id===id);
      if(!d || !d.prospectus_name){
        return setToast("None", "No prospectus attached to this deal.");
      }

      if(!d.prospectus_data){
        return setToast("Demo limit", "Prospectus filename exists but PDF data was not stored (file too large).");
      }

      const a = document.createElement("a");
      a.href = d.prospectus_data;
      a.download = d.prospectus_name || ("prospectus_" + id + ".pdf");
      a.click();
    }

    function importDealsCsv(){
      const f = $("#bulkDeals")?.files?.[0];
      if(!f) return setToast("Missing", "Choose a CSV file.");

      const reader = new FileReader();
      reader.onload = ()=>{
        const text = String(reader.result||"").trim();
        const lines = text.split(/\r?\n/).map(x=>x.trim()).filter(Boolean);
        if(lines.length < 2) return setToast("Invalid", "CSV has no data rows.");

        const headers = lines.shift().split(",").map(x=>x.trim().toLowerCase());

        const deals = getDeals();
        let added = 0;

        lines.forEach(line=>{
          const cols = line.split(",");
          const obj = {};
          headers.forEach((h,i)=> obj[h] = (cols[i]||"").trim());

          if(!obj.country || !obj.sector) return;

          deals.push({
            id: "d" + Date.now() + Math.floor(Math.random()*100000),
            country: obj.country,
            sector: obj.sector,
            ticket_usd_m: Number(obj.ticket_usd_m||0),
            stage: obj.stage || "Origination",
            summary: obj.summary || "",
            region: obj.region || pickRegion(),
            status: "Draft",
            warmth: "Warm",

            // prospectus fields
            prospectus_name: "",
            prospectus_data: "",
            prospectus_mime: "",
            prospectus_size: 0,
            prospectus_updated_at: ""
          });
          added += 1;
        });

        saveDeals(deals);
        setToast("Imported", `${added} deals imported (demo).`);
        renderDealsManager();
      };
      reader.readAsText(f);
    }

      const deal = {
        id: id || ("d" + Date.now()),

        prospectus_mime: existing?.prospectus_mime || "",
        prospectus_size: existing?.prospectus_size || 0,

      };

      if(!deal.country || !deal.sector || !deal.ticket_usd_m){
        setToast("Missing fields", "Country, sector and ticket size are required in this demo.");
        return;

      const idx = deals.findIndex(x=>x.id===deal.id);
      if(idx >= 0) deals[idx] = deal; else deals.push(deal);
      saveDeals(deals);

      setToast("Saved", "Deal saved. Prospectus can be attached below.");
      renderDealsManager();
      loadDeal(deal.id);

        el.innerHTML = `<small class="tag ok">Attached: ${escapeHtml(name)} (${stored}${sizeTxt})</small>`;
      } else {
        el.innerHTML = `<small class="muted">No catalog attached.</small>`;
      }
    }

    function attachBoothCatalog(){
      const id = ($("#boothId")?.value || "").trim();
      if(!id) return setToast("Save first", "Save the booth first, then attach a catalog.");

      const f = $("#boothCatalog")?.files?.[0];
      if(!f) return setToast("Missing", "Choose a PDF file first.");
      if(f.type !== "application/pdf") return setToast("Invalid file", "Please upload a PDF catalog.");

      const MAX_STORE_BYTES = 1_500_000;
      const booths = getBooths();
      const idx = booths.findIndex(x=>x.id===id);
      if(idx < 0) return setToast("Not found", "Booth not found.");

      booths[idx].catalog_name = f.name;
      booths[idx].catalog_mime = f.type;
      booths[idx].catalog_size = f.size;
      booths[idx].catalog_updated_at = new Date().toISOString();

      if(f.size > MAX_STORE_BYTES){
        booths[idx].catalog_data = "";
        saveBooths(booths);
        updateBoothCatalogStatusUi();
        return setToast("Attached (name only)", `PDF is ${humanFileSize(f.size)} — too large for demo storage. Stored filename only.`);
      }

      const reader = new FileReader();
      reader.onload = ()=>{
        booths[idx].catalog_data = String(reader.result || "");
        saveBooths(booths);
        updateBoothCatalogStatusUi();
        setToast("Attached", "Catalog stored and ready for Public download (demo).");
      };
      reader.onerror = ()=> setToast("Error", "Could not read the PDF (demo).");
      reader.readAsDataURL(f);
    }

    function downloadBoothCatalog(){
      const id = ($("#boothId")?.value || "").trim();
      if(!id) return setToast("No booth", "Load a booth first.");

      const b = getBooths().find(x=>x.id===id);
      const name = b?.catalog_name || b?.catalog || "";
      if(!b || !name) return setToast("None", "No catalog attached to this booth.");
      if(!b.catalog_data) return setToast("Demo limit", "Catalog filename exists but PDF data was not stored (file too large).");

      const a = document.createElement("a");
      a.href = b.catalog_data;
      a.download = name || ("catalog_" + id + ".pdf");
      a.click();
    }

    function loadBooth(id){
      const b = getBooths().find(x=>x.id===id);
      if(!b) return;

      $("#boothId").value = b.id;
      $("#boothRegion").value = b.region || pickRegion();
      $("#boothOrg").value = b.org || "";
      $("#boothOffers").value = b.offers || "";
      $("#boothStatus").value = b.status || "Published";
      if($("#boothCatalog")) $("#boothCatalog").value = "";
      updateBoothCatalogStatusUi();
      setToast("Loaded", "Booth loaded for editing (demo).");
    }

    function saveBooth(){
      const id = ($("#boothId").value || "").trim();
      const booths = getBooths();
      const existing = id ? booths.find(x=>x.id===id) : null;

      const booth = {
        id: id || ("b" + Date.now()),
        region: $("#boothRegion").value,
        org: ($("#boothOrg").value || "").trim(),
        offers: ($("#boothOffers").value || "").trim(),
        status: $("#boothStatus").value,

        // keep catalog fields if already attached
        catalog_name: existing?.catalog_name || existing?.catalog || "",
        catalog_data: existing?.catalog_data || "",
        catalog_mime: existing?.catalog_mime || "",
        catalog_size: existing?.catalog_size || 0,
        catalog_updated_at: existing?.catalog_updated_at || ""
      };

      if(!booth.org){
        return setToast("Missing fields", "Organisation is required.");
      }

      const idx = booths.findIndex(x=>x.id===booth.id);
      if(idx >= 0) booths[idx] = booth; else booths.push(booth);
      saveBooths(booths);

      setToast("Saved", "Booth saved. Catalog can be attached below.");
      renderExpoAdmin();
      loadBooth(booth.id);
    }

    function deleteBooth(id){
      const booths = getBooths().filter(b=>b.id!==id);
      saveBooths(booths);
      setToast("Deleted", "Booth removed (demo).");
      renderExpoAdmin();
    }

    function doSearch(){
      const q = ($("#q").value || "").toLowerCase().trim();
      const hits = [];

      const evs = adminFilter(getEvents());
      evs.forEach(e=>{
        if([e.title,e.theme,e.venue,e.type,e.date].join(" ").toLowerCase().includes(q)){
          hits.push({type:"Event", label:e.title+" • "+e.date});
        }
      });

      const deals = adminFilter(getDeals());
      deals.forEach(d=>{
        if([d.country,d.sector,(d.summary||""),d.stage].join(" ").toLowerCase().includes(q)){
          hits.push({type:"Deal", label:d.country+" • "+d.sector+" • "+fmtMoney(d.ticket_usd_m)});
        }
      });

      $("#results").innerHTML = hits.length
        ? `<ul style="margin:0; padding-left:18px; color:var(--muted); line-height:1.55">${hits.map(h=>`<li><b>${escapeHtml(h.type)}:</b> ${escapeHtml(h.label)}</li>`).join("")}</ul>`
        : `<small>No results.</small>`;
    }

      else if(h.startsWith("#analytics")) renderAnalytics();
      else if(h.startsWith("#archive")) renderArchive();
      else renderDashboard();
    }
