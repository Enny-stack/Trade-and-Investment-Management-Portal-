<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>TIMP – Admin Console (Standalone Test)</title>
  <style>
    :root{--bg:#0b1220;--panel:#0f1a2d;--line:#24324a;--muted:#9bb0d0;--text:#e9f0ff;}
    *{box-sizing:border-box;font-family:system-ui,Segoe UI,Roboto,Arial}
    body{margin:0;background:radial-gradient(1200px 600px at 60% 10%, #1a2b45 0%, var(--bg) 55%);color:var(--text)}
    .topbar{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;border-bottom:1px solid var(--line);background:rgba(8,12,20,.65);backdrop-filter: blur(10px);position:sticky;top:0}
    .brand{display:flex;gap:12px;align-items:center}
    .logo{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,#f5c84c,#0ea5e9)}
    .sub{display:block;color:var(--muted);font-size:12px;margin-top:2px}
    .layout{display:grid;grid-template-columns:280px 1fr;min-height:calc(100vh - 64px)}
    .sidebar{border-right:1px solid var(--line);padding:14px;background:rgba(9,14,24,.6)}
    .navtitle{color:var(--muted);font-size:12px;letter-spacing:.12em;text-transform:uppercase;margin:14px 10px}
    .nav a{display:flex;justify-content:space-between;align-items:center;text-decoration:none;color:var(--text);padding:10px 10px;border-radius:12px;margin:4px 0}
    .nav a:hover{background:rgba(255,255,255,.06)}
    .nav a.active{background:rgba(14,165,233,.18);outline:1px solid rgba(14,165,233,.35)}
    .badge{background:rgba(255,255,255,.08);border:1px solid var(--line);padding:2px 8px;border-radius:999px;font-size:12px;color:var(--muted)}
    .main{padding:18px 18px 40px}
    .hero{border:1px solid var(--line);background:linear-gradient(90deg,rgba(14,165,233,.15),rgba(245,200,76,.12));border-radius:18px;padding:16px}
    .meta{margin-top:8px;color:var(--muted);display:flex;gap:10px;flex-wrap:wrap}
    .tag{padding:3px 10px;border-radius:999px;border:1px solid var(--line);font-size:12px;color:var(--muted);background:rgba(255,255,255,.05)}
    .grid{display:grid;gap:14px;margin-top:14px}
    .cols-3{grid-template-columns:repeat(3,minmax(0,1fr))}
    .cols-2{grid-template-columns:repeat(2,minmax(0,1fr))}
    .card{border:1px solid var(--line);background:rgba(12,18,30,.65);border-radius:18px;padding:14px}
    .big{font-size:34px;font-weight:800}
    .label{color:var(--muted);font-size:12px}
    button{border:1px solid var(--line);background:rgba(255,255,255,.08);color:var(--text);padding:9px 12px;border-radius:12px;cursor:pointer}
    button:hover{background:rgba(255,255,255,.12)}
    @media (max-width: 980px){.layout{grid-template-columns:1fr}.sidebar{display:none}.cols-3,.cols-2{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="topbar">
    <div class="brand">
      <div class="logo"></div>
      <div>
        <div><b>Admin Console</b></div>
        <span class="sub">Trade & Investment Management Portal (TIMP)</span>
      </div>
    </div>
    <div class="badge">Standalone test (no external files)</div>
  </div>

  <div class="layout">
    <aside class="sidebar">
      <div class="navtitle">Admin</div>
      <nav class="nav" id="sidebarNav">
        <a href="#dashboard" data-nav="dashboard"><span>Dashboard</span></a>
        <a href="#events" data-nav="events"><span>Create / Edit Event</span></a>
        <a href="#regs" data-nav="regs"><span>Registrations</span><span class="badge" id="regCount">0</span></a>
        <a href="#deals" data-nav="deals"><span>Deals</span></a>
        <a href="#analytics" data-nav="analytics"><span>Analytics</span></a>
      </nav>
    </aside>

    <main class="main">
      <div class="hero">
        <h1 id="pageTitle" style="margin:0">Admin Dashboard</h1>
        <div class="meta" id="pageMeta"></div>
      </div>

      <div id="pageBody"></div>
    </main>
  </div>

  <script>
    // sample demo data
    const EVENTS = [{id:"ev1", title:"Investment Forum", date:"2026-07-15"}];
    const DEALS  = [{id:"d1", country:"Nigéria", sector:"Énergie", ticket:80}];
    const REGS   = [{id:"r1", name:"Test User", email:"test@example.com", event_id:"ev1", state:"Pending"}];

    const $ = (s)=>document.querySelector(s);
    const $$ = (s)=>Array.from(document.querySelectorAll(s));

    function setActive(key){
      $$("#sidebarNav a").forEach(a=>a.classList.remove("active"));
      const a = $(`#sidebarNav a[data-nav="${key}"]`);
      if(a) a.classList.add("active");
    }

    function renderDashboard(){
      setActive("dashboard");
      $("#pageTitle").textContent = "Admin Dashboard";
      $("#pageMeta").innerHTML = `<span class="tag">Standalone OK</span> <span class="tag">Routing OK</span>`;
      $("#regCount").textContent = REGS.length;

      $("#pageBody").innerHTML = `
        <div class="grid cols-3">
          <div class="card"><div class="label">Events</div><div class="big">${EVENTS.length}</div></div>
          <div class="card"><div class="label">Registrations</div><div class="big">${REGS.length}</div></div>
          <div class="card"><div class="label">Deals</div><div class="big">${DEALS.length}</div></div>
        </div>
      `;
    }

    function renderEvents(){
      setActive("events");
      $("#pageTitle").textContent = "Create / Edit Event";
      $("#pageMeta").innerHTML = `<span class="tag">Demo module</span>`;
      $("#pageBody").innerHTML = `<div class="card"><b>Events</b><div style="margin-top:10px;color:#9bb0d0">${EVENTS.map(e=>`${e.title} • ${e.date}`).join("<br>")}</div></div>`;
    }

    function renderRegs(){
      setActive("regs");
      $("#pageTitle").textContent = "Registrations";
      $("#pageMeta").innerHTML = `<span class="tag">Demo module</span>`;
      $("#regCount").textContent = REGS.length;
      $("#pageBody").innerHTML = `<div class="card"><b>Registrations</b><div style="margin-top:10px;color:#9bb0d0">${REGS.map(r=>`${r.name} • ${r.email} • ${r.state}`).join("<br>")}</div></div>`;
    }

    function renderDeals(){
      setActive("deals");
      $("#pageTitle").textContent = "Deals";
      $("#pageMeta").innerHTML = `<span class="tag">Demo module</span>`;
      $("#pageBody").innerHTML = `<div class="card"><b>Deals</b><div style="margin-top:10px;color:#9bb0d0">${DEALS.map(d=>`${d.country} • ${d.sector} • $${d.ticket}m`).join("<br>")}</div></div>`;
    }

    function renderAnalytics(){
      setActive("analytics");
      $("#pageTitle").textContent = "Analytics";
      $("#pageMeta").innerHTML = `<span class="tag">Demo module</span>`;
      $("#pageBody").innerHTML = `<div class="card"><b>Analytics</b><div style="margin-top:10px;color:#9bb0d0">If you can see this, your router + rendering works.</div></div>`;
    }

    function route(){
      const h = (location.hash || "#dashboard").toLowerCase();
      if(h.startsWith("#events")) return renderEvents();
      if(h.startsWith("#regs")) return renderRegs();
      if(h.startsWith("#deals")) return renderDeals();
      if(h.startsWith("#analytics")) return renderAnalytics();
      return renderDashboard();
    }

    window.addEventListener("hashchange", route);
    route();
  </script>
</body>
</html>
