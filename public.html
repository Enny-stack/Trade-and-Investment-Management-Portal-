<!-- public.html (UPDATED: Proposal Template button fixed + safer download path) -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>TIMP – Public Portal</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="topbar">
    <div class="brand">
      <div class="logo"></div>
      <div>
        <div class="i18n" data-key="public">Public Portal</div>
        <span class="sub i18n" data-key="timp">Trade & Investment Management Portal (TIMP)</span>
      </div>
    </div>
    <div class="pills">
      <a class="pill" href="index.html"><small>Home</small></a>
      <div class="pill"><small class="i18n" data-key="region">Region</small>&nbsp;<select id="regionSel"></select></div>
      <div class="pill"><small class="i18n" data-key="language">Language</small>&nbsp;
        <select id="langSel">
          <option value="en">English</option>
          <option value="fr">Français</option>
          <option value="ar">العربية</option>
          <option value="pt">Português</option>
        </select>
      </div>
    </div>
  </div>

  <div class="layout">
    <aside class="sidebar">
      <div class="navtitle">Public</div>
      <nav class="nav" id="sidebarNav">
        <a href="#events" data-nav="events"><span class="i18n" data-key="events">Events</span><span class="badge" id="evCount"></span></a>
        <a href="#dealroom" data-nav="deal_room"><span class="i18n" data-key="deal_room">Deal Room</span><span class="badge" id="matchCount"></span></a>

        <!-- ✅ Region Profiles -->
        <a href="#regionprofiles" data-nav="region_profiles"><span>Region Profiles</span></a>

        <a href="#opps" data-nav="opportunities"><span class="i18n" data-key="opportunities">Opportunities</span></a>
        <a href="#expo" data-nav="exhibition"><span class="i18n" data-key="exhibition">Virtual Exhibition</span></a>
        <a href="#archive" data-nav="archive"><span class="i18n" data-key="archive">Archive</span></a>
        <a href="#profile" data-nav="profile"><span class="i18n" data-key="profile">My Profile</span></a>
      </nav>

      <div class="navtitle">Shortcut</div>
      <nav class="nav">
        <a href="admin.html"><span>Switch to Admin</span><span class="badge">demo</span></a>
        <a href="welcome.html"><span>Demo Script</span></a>

        <!-- ✅ Logout (safe even if auth.js not ready yet) -->
        <a href="#" onclick="(window.TIMP_AUTH && TIMP_AUTH.logout ? TIMP_AUTH.logout() : null); location.href='welcome.html'; return false;">
          <span>Logout</span><span class="badge">demo</span>
        </a>
      </nav>
    </aside>

    <main class="main">
      <div class="hero">
        <h1 id="pageTitle">Events</h1>
        <div class="meta" id="pageMeta"></div>
        <div class="row" id="pageActions"></div>
      </div>

      <div id="pageBody" style="margin-top:14px;"></div>
    </main>
  </div>

  <div class="toast" id="toast">
    <b id="toastTitle"></b>
    <div id="toastMsg"></div>
  </div>

  <!-- =========================================================
       ✅ AUTH GATE MUST LOAD FIRST (BEFORE portal scripts)
       ========================================================= -->
  <script src="auth.js"></script>
  <script>
    (function(){
      try{
        document.documentElement.style.visibility = "hidden";

        if(window.TIMP_AUTH && typeof TIMP_AUTH.requireAuth === "function"){
          const ok = TIMP_AUTH.requireAuth("welcome.html");
          if(!ok){
            return;
          }
        }
        document.documentElement.style.visibility = "";
      }catch(e){
        console.warn("Auth gate warning:", e);
        document.documentElement.style.visibility = "";
      }
    })();
  </script>

  <!-- Only load portal JS after gate -->
  <script src="data.js"></script>
  <script src="util.js"></script>
  <script src="regionStore.js"></script>
  <script src="app.js"></script>

  <!-- ✅ Your portal logic -->
  <script>
  if(window.TIMP_AUTH && typeof TIMP_AUTH.isAuthed === "function" && !TIMP_AUTH.isAuthed()){
    console.warn("Not registered yet — skipping public portal init.");
  } else {

    // -----------------------------
    // Helpers + Safe storage
    // -----------------------------
    let OPEN_EVENT_ID = null;

    function safeEvents(){
      return (typeof getEvents === "function") ? getEvents() : ((window.TIMP_DATA && TIMP_DATA.events) || []);
    }
    function safeDeals(){
      return (typeof getDeals === "function") ? getDeals() : ((window.TIMP_DATA && TIMP_DATA.deals) || []);
    }

    // ✅ fallbacks so Public sees Admin changes saved to localStorage
    window.getEvents = window.getEvents || function(){
      try{
        const x = JSON.parse(localStorage.getItem("timp_events") || "null");
        if(Array.isArray(x)) return x;
      }catch(e){}
      return ((window.TIMP_DATA && TIMP_DATA.events) || []);
    };

    window.getDeals = window.getDeals || function(){
      try{
        const x = JSON.parse(localStorage.getItem("timp_deals") || "null");
        if(Array.isArray(x)) return x;
      }catch(e){}
      return ((window.TIMP_DATA && TIMP_DATA.deals) || []);
    };

    window.getBooths = window.getBooths || function(){
      try{
        const x = JSON.parse(localStorage.getItem("timp_booths") || "null");
        if(Array.isArray(x)) return x;
      }catch(e){}
      return ((window.TIMP_DATA && TIMP_DATA.booths) || []);
    };

    function safeBooths(){
      return (typeof getBooths === "function") ? getBooths() : ((window.TIMP_DATA && TIMP_DATA.booths) || []);
    }

    // ✅ helper: download a stored dataURL as a file
    function downloadDataUrl(dataUrl, filename){
      if(!dataUrl) return;
      const a = document.createElement("a");
      a.href = dataUrl;
      a.download = filename || "download";
      a.click();
    }

    // ✅ helper: download a repo/static file safely (handles spaces + tries a few relative candidates)
    async function downloadStaticFile(relPath, filename){
      const clean = String(relPath || "").replace(/^\//, ""); // avoid absolute root issues on project pages
      const candidates = [
        clean,
        "./" + clean,
        "../" + clean
      ];

      // Try to verify existence first (so we can show a useful toast)
      for(const c of candidates){
        const url = encodeURI(c);
        try{
          const head = await fetch(url, { method: "HEAD", cache: "no-store" });
          if(head.ok){
            const a = document.createElement("a");
            a.href = url;
            a.download = filename || (clean.split("/").pop() || "download.pdf");
            a.target = "_blank";
            document.body.appendChild(a);
            a.click();
            a.remove();
            return { ok: true, url };
          }
        }catch(e){
          // ignore and keep trying
        }
      }

      // Fallback: still attempt to open first candidate
      const fallbackUrl = encodeURI(clean);
      const a = document.createElement("a");
      a.href = fallbackUrl;
      a.download = filename || (clean.split("/").pop() || "download.pdf");
      a.target = "_blank";
      document.body.appendChild(a);
      a.click();
      a.remove();

      return { ok: false, url: fallbackUrl };
    }

    // =========================================================
    // ✅ Project Proposal Template download (FIXED)
    // =========================================================
    function getProposalTemplateMeta(){
      const lang =
        (typeof pickLang === "function" ? pickLang() : (document.getElementById("langSel")?.value || "en"));

      const urlMap = {
        en: "assets/Project Proposal Template ENG (3).pdf",
        fr: "assets/Project Proposal Template FR.pdf",
        ar: "assets/Project Proposal Template ENG (3).pdf",
        pt: "assets/Project Proposal Template ENG (3).pdf"
      };

      const labelMap = {
        en: "Download Project Proposal Template (Deal Book)",
        fr: "Télécharger le modèle de proposition (Deal Book)",
        ar: "تحميل نموذج مقترح المشروع (Deal Book)",
        pt: "Baixar modelo de proposta (Deal Book)"
      };

      const rel = urlMap[lang] || urlMap.en;

      return {
        lang,
        rel,
        label: labelMap[lang] || labelMap.en,
        filename: (rel.split("/").pop() || "Project_Proposal_Template.pdf")
      };
    }

    // ✅ IMPORTANT: define as normal function AND export to window (so inline onclick always works)
    async function downloadProposalTemplate(){
      const tpl = getProposalTemplateMeta();
      const res = await downloadStaticFile(tpl.rel, tpl.filename);

      if(!res.ok){
        setToast(
          "File not found on site",
          "Your PDF is in the GitHub repo, but it may not be in the published Pages folder. If Pages is using /docs, move assets into /docs/assets too."
        );
        console.warn("Proposal template not reachable. Tried:", tpl.rel, res.url);
      } else {
        setToast("Downloading", tpl.filename);
      }
    }
    window.downloadProposalTemplate = downloadProposalTemplate; // ✅ makes the button click work reliably

    // ✅ Public download: Prospectus for a deal
    function downloadDealProspectus(dealId){
      const d = safeDeals().find(x => x.id === dealId);
      if(!d || !d.prospectus_name){
        return setToast("No prospectus", "This deal has no prospectus attached yet.");
      }
      if(!d.prospectus_data){
        return setToast("Demo limit", "Prospectus name exists, but PDF data wasn’t stored (file too large in demo).");
      }
      downloadDataUrl(d.prospectus_data, d.prospectus_name);
    }

    function requestProspectus(dealId){
      const d = safeDeals().find(x => x.id === dealId);
      const log = JSON.parse(localStorage.getItem("timp_prospectus_requests") || "[]");
      log.push({
        id: "pr" + Date.now(),
        deal_id: dealId,
        deal_label: d ? `${d.country} • ${d.sector}` : dealId,
        at: new Date().toISOString()
      });
      localStorage.setItem("timp_prospectus_requests", JSON.stringify(log));
      setToast("Requested", "Prospectus request recorded (demo signal). If available, use Download.");
    }

    // registrations store
    window.getRegistrations = window.getRegistrations || function(){
      try{
        const x = JSON.parse(localStorage.getItem("timp_regs"));
        if(Array.isArray(x)) return x;
      }catch(e){}
      return ((window.TIMP_DATA && TIMP_DATA.registrations) || []);
    };

    window.saveRegistrations = window.saveRegistrations || function(rows){
      localStorage.setItem("timp_regs", JSON.stringify(rows || []));
    };

    // profile store
    window.getMyProfile = window.getMyProfile || function(){
      try{
        const p = JSON.parse(localStorage.getItem("timp_profile"));
        if(p && typeof p === "object") return p;
      }catch(e){}
      return {
        salutation: "Mr",
        first_name: "",
        last_name: "",
        org: "",
        position: "",
        email: "",
        phone: ""
      };
    };

    window.saveMyProfile = window.saveMyProfile || function(p){
      localStorage.setItem("timp_profile", JSON.stringify(p || {}));
      if(p && p.email) localStorage.setItem("timp_user_email", p.email);
    };

    // compat wrappers
    window.getProfile = window.getProfile || function(){
      const p = getMyProfile();
      return {
        name: `${p.first_name || ""} ${p.last_name || ""}`.trim() || "Demo User",
        org: p.org || "",
        title: p.position || "",
        email: p.email || "",
        phone: p.phone || "",
        salutation: p.salutation || "Mr",
        first_name: p.first_name || "",
        last_name: p.last_name || "",
        position: p.position || ""
      };
    };

    window.saveProfile = window.saveProfile || function(pCompat){
      const prev = getMyProfile();
      const next = {
        salutation: pCompat.salutation || prev.salutation || "Mr",
        first_name: pCompat.first_name || (pCompat.name ? String(pCompat.name).split(" ")[0] : prev.first_name) || "",
        last_name:  pCompat.last_name  || (pCompat.name ? String(pCompat.name).split(" ").slice(1).join(" ") : prev.last_name) || "",
        org: pCompat.org || prev.org || "",
        position: pCompat.position || pCompat.title || prev.position || "",
        email: pCompat.email || prev.email || "",
        phone: pCompat.phone || prev.phone || ""
      };
      saveMyProfile(next);
    };

    function getDealBooks(){
      try{
        const x = JSON.parse(localStorage.getItem("timp_deal_books"));
        if(x && typeof x === "object") return x;
      }catch(e){}
      return {};
    }
    function saveDealBooks(obj){
      localStorage.setItem("timp_deal_books", JSON.stringify(obj));
    }

    function isDealVisibleOnPublic(d){
      if(!d || typeof d !== "object") return false;
      if(!("status" in d)) return true;
      return d.status !== "Draft";
    }

    function myRegForEvent(eventId){
      const p = getMyProfile();
      const email = String(p.email || localStorage.getItem("timp_user_email") || "").toLowerCase().trim();
      if(!email) return null;
      return getRegistrations().find(r =>
        r.event_id === eventId &&
        String(r.email || "").toLowerCase().trim() === email
      ) || null;
    }

    function regTag(state){
      const s = state || "Pending";
      const cls = (s === "Approved") ? "ok" : (s === "Pending") ? "warn" : "muted";
      return `<span class="tag ${cls}">${s}</span>`;
    }

    // Auto-refresh Public when Admin changes
    window.addEventListener("storage", (e)=>{
      if(e.key === "timp_regs"){
        if(OPEN_EVENT_ID) openEvent(OPEN_EVENT_ID);
        else route();
      }
      if(e.key === "timp_events"){
        if(location.hash.startsWith("#events")) renderEvents();
      }
      if(e.key === "timp_profile"){
        if(location.hash.startsWith("#profile")) renderProfile();
        if(OPEN_EVENT_ID) {
          setTimeout(()=>{
            fillRegFromProfile();
            updateRegStatus();
          }, 0);
        }
      }
      if(e.key === "timp_deals"){
        if(location.hash.startsWith("#dealroom")) renderDealRoom();
        if(location.hash.startsWith("#opps")) renderOpps();
      }
      if(e.key === "timp_booths"){
        if(location.hash.startsWith("#expo")) renderExpo();
      }

      const regionKeys = ["timp_region_profiles","timp_regionprofiles","timp_regionStore"];
      if(regionKeys.includes(e.key) && location.hash.startsWith("#regionprofiles")){
        initRegionProfileSearch();
      }
    });

    // -----------------------------
    // Topbar init (SAFER)
    // -----------------------------
    const regionSel = document.getElementById("regionSel");
    if(window.TIMP_REGIONS && Array.isArray(TIMP_REGIONS) && regionSel){
      TIMP_REGIONS.forEach(r=>{
        const opt = document.createElement("option");
        opt.value = r.id;
        opt.textContent = r.name[pickLang()] || r.name.en;
        regionSel.appendChild(opt);
      });
    }
    if(typeof initTopbar === "function") initTopbar();

    function setActive(navKey){
      $$("#sidebarNav a").forEach(a=>a.classList.remove("active"));
      const match = $(`#sidebarNav a[data-nav="${navKey}"]`);
      if(match) match.classList.add("active");
    }

    // -----------------------------
    // Registration helpers
    // -----------------------------
    function fillRegFromProfile(){
      const p = getMyProfile();
      if($("#regSalutation")) $("#regSalutation").value = p.salutation || "Mr";
      if($("#regFirst")) $("#regFirst").value = p.first_name || "";
      if($("#regLast")) $("#regLast").value = p.last_name || "";
      if($("#regOrg")) $("#regOrg").value = p.org || "";
      if($("#regPosition")) $("#regPosition").value = p.position || "";
      if($("#regEmail")) $("#regEmail").value = p.email || "";
      if($("#regPhone")) $("#regPhone").value = p.phone || "";
    }

    function updateRegStatus(){
      if(!window.CURRENT_EVENT_ID) return;
      const regs = getRegistrations();
      const email = ($("#regEmail")?.value || localStorage.getItem("timp_user_email") || "").trim().toLowerCase();
      const r = regs.find(x =>
        x.event_id === window.CURRENT_EVENT_ID &&
        String(x.email||"").toLowerCase().trim() === email
      );
      if($("#regStatus")){
        $("#regStatus").innerHTML = r
          ? `<small>Status: <b>${r.state || "Pending"}</b></small>`
          : `<small class="muted">Status: Not registered</small>`;
      }
    }

    function registerForEvent(eventId){
      const id = eventId || window.CURRENT_EVENT_ID;
      if(!id) return setToast("Missing event", "Open an event first.");

      const events = safeEvents();
      const ev = events.find(e=>e.id===id);
      if(!ev) return setToast("Missing event", "Event not found.");

      const reg = {
        id: "r" + Date.now(),
        event_id: ev.id,
        region: ev.region,
        state: "Pending",

        salutation: ($("#regSalutation").value || "Mr").trim(),
        first_name: ($("#regFirst").value || "").trim(),
        last_name: ($("#regLast").value || "").trim(),
        org: ($("#regOrg").value || "").trim(),
        position: ($("#regPosition").value || "").trim(),
        email: ($("#regEmail").value || "").trim(),
        phone: ($("#regPhone").value || "").trim(),
        submitted_at: new Date().toISOString()
      };

      if(!reg.first_name || !reg.last_name || !reg.org || !reg.position || !reg.email){
        return setToast("Missing fields", "Fill First name, Last name, Organisation, Position, and Email.");
      }

      saveMyProfile({
        salutation: reg.salutation,
        first_name: reg.first_name,
        last_name: reg.last_name,
        org: reg.org,
        position: reg.position,
        email: reg.email,
        phone: reg.phone
      });

      const regs = getRegistrations();

      const exists = regs.find(x =>
        x.event_id===reg.event_id &&
        String(x.email||"").toLowerCase().trim()===reg.email.toLowerCase().trim()
      );

      if(exists){
        setToast("Already registered", "You already registered for this event. Check your status below.");
        updateRegStatus();
        return;
      }

      regs.push(reg);
      saveRegistrations(regs);

      setToast("Submitted", "Registration saved. Admin can now Approve/Reject.");
      updateRegStatus();
    }

    // -----------------------------
    // REGION PROFILES (Public Search)
    // -----------------------------
    window.getRegionProfiles = window.getRegionProfiles || function(){
      const keysToTry = ["timp_region_profiles", "timp_regionprofiles", "timp_regionStore"];
      for(const k of keysToTry){
        try{
          const x = JSON.parse(localStorage.getItem(k) || "null");
          if(Array.isArray(x)) return x;
        }catch(e){}
      }
      return [];
    };

    window.rp_pickLangContent = window.rp_pickLangContent || function(profile, lang){
      if(!profile || typeof profile !== "object") return {};
      const c = profile.content || profile.i18n || profile.text || null;

      if(c && typeof c === "object" && c[lang]) return c[lang];
      if(c && typeof c === "object" && c.en) return c.en;

      return {
        title: profile.title || profile.name || "",
        subtitle: profile.subtitle || "",
        overview: profile.overview || profile.summary || "",
        tags: profile.tags || []
      };
    };

    function rp_normRegionKey(v){
      const s = String(v || "").toLowerCase().trim();
      if(!s) return "";
      if(s === "south" || s.includes("southern")) return "southern";
      if(s.includes("north")) return "north";
      if(s.includes("west")) return "west";
      if(s.includes("central") || s.includes("centre")) return "central";
      if(s.includes("east")) return "east";
      return s;
    }

    window.rp_searchPublished = window.rp_searchPublished || function(q, lang, regionFilter){
      const query = String(q || "").toLowerCase().trim();
      const region = regionFilter ? rp_normRegionKey(regionFilter) : null;

      const rows = window.getRegionProfiles();

      return rows
        .filter(p => {
          const pub = (p.published === true) || (p.status === "Published") || (p.visibility === "Public");
          return pub;
        })
        .filter(p => {
          if(!region) return true;
          const pr = rp_normRegionKey(p.region || p.region_id || p.regionKey || "");
          return pr === region;
        })
        .filter(p => {
          if(!query) return true;
          const c = rp_pickLangContent(p, lang) || {};
          const hay = [
            c.title, c.subtitle, c.overview,
            ...(Array.isArray(c.tags) ? c.tags : []),
            p.country, p.sector
          ].join(" ").toLowerCase();
          return hay.includes(query);
        });
    };

    function rp_currentLang(){
      const sel = document.getElementById("langSel");
      return sel ? sel.value : "en";
    }

    function rp_escapeHtml(s){
      return (s || "").replace(/[&<>"']/g, m => ({
        "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
      }[m]));
    }

    function rp_renderCard(profile, lang){
      const c = rp_pickLangContent(profile, lang) || {};
      const title = c.title || "Region Profile";
      const subtitle = c.subtitle || "";
      const overviewFull = String(c.overview || "");
      const overview = overviewFull.slice(0, 240);
      const tags = Array.isArray(c.tags) ? c.tags : [];

      return `
        <div class="card" style="margin:12px 0;">
          <h3 style="margin:0 0 6px 0;">${rp_escapeHtml(title)}</h3>
          ${subtitle ? `<div style="color:var(--muted); margin-bottom:8px;">${rp_escapeHtml(subtitle)}</div>` : ""}
          ${overview ? `<p style="color:var(--muted); line-height:1.55;">${rp_escapeHtml(overview)}${overviewFull.length>240 ? "..." : ""}</p>` : ""}
          ${tags.length ? `
            <div style="margin-top:10px; display:flex; gap:8px; flex-wrap:wrap;">
              ${tags.map(t => `<span class="tag muted">${rp_escapeHtml(t)}</span>`).join("")}
            </div>` : ""
          }
        </div>
      `;
    }

    function rp_refreshResults(){
      const lang = rp_currentLang();
      const q = document.getElementById("rpSearchInput")?.value || "";
      const regionFilter = document.getElementById("rpRegionFilter")?.value || "all";

      const results = rp_searchPublished(q, lang, regionFilter !== "all" ? regionFilter : null);
      const el = document.getElementById("rpResults");
      if(!el) return;

      if(!results.length){
        el.innerHTML = `<div class="card"><p style="color:var(--muted);">No published region profiles match your search yet.</p></div>`;
        return;
      }

      el.innerHTML = results.map(p => rp_renderCard(p, lang)).join("");
    }

    function initRegionProfileSearch(){
      const input = document.getElementById("rpSearchInput");
      const filter = document.getElementById("rpRegionFilter");
      const langSel = document.getElementById("langSel");

      if(!input || !filter) return;

      if(!input.dataset.bound){
        input.addEventListener("input", rp_refreshResults);
        input.dataset.bound = "1";
      }
      if(!filter.dataset.bound){
        filter.addEventListener("change", rp_refreshResults);
        filter.dataset.bound = "1";
      }
      if(langSel && !langSel.dataset.rpBound){
        langSel.addEventListener("change", rp_refreshResults);
        langSel.dataset.rpBound = "1";
      }

      rp_refreshResults();
    }

    // -----------------------------
    // EVENTS (Public)
    // -----------------------------
    function renderEvents(){
      setActive("events");
      $("#pageTitle").textContent = t("events");
      $("#pageMeta").innerHTML = `<span class="tag ok">${regionLabel(pickRegion())}</span> <span class="tag muted">Annual calendar + event profiles</span>`;
      $("#pageActions").innerHTML = ``;

      const evs = filterByRegion(safeEvents()).filter(e => e.status === "Published");
      $("#evCount").textContent = evs.length;

      const rows = evs.map(e=>{
        const my = myRegForEvent(e.id);
        const actionRight = my
          ? regTag(my.state)
          : `<button type="button" onclick="openEvent('${e.id}')">Register</button>`;

        return `
          <tr>
            <td><b>${e.title}</b><br><small>${e.type} • ${e.venue}</small></td>
            <td>${e.date} <small>(${e.time || ""})</small></td>
            <td><span class="tag ok">Published</span></td>
            <td class="row-actions">
              <button type="button" class="secondary" onclick="openEvent('${e.id}')">Open</button>
              ${actionRight}
            </td>
          </tr>
        `;
      }).join("");

      $("#pageBody").innerHTML = `
        <div class="card">
          <h2>Annual Global Calendar</h2>

    function submitOpportunity(){
      const country = ($("#subCountry").value || "").trim();
      const sector = ($("#subSector").value || "").trim();
      const ticket = parseInt($("#subTicket").value || "0", 10);
      const stage = $("#subStage").value;
      const summary = ($("#subSummary").value || "").trim();
      const fileEl = $("#subFile");

      if(!country || !sector || !ticket){
        setToast("Missing fields", "Country, sector, and ticket size are required.");
        return;
      }

      const deals = safeDeals();
      const id = "d" + Date.now();

      const newDeal = {
        id,
        region: pickRegion(),
        country,
        sector,
        ticket_usd_m: ticket,
        stage,
        warmth: "Warm",
        owner: "Public submission",
        summary,
        video: "Deal pack (demo)",
        status: "Pending"
      };

      if(typeof saveDeals === "function"){
        deals.push(newDeal);
        saveDeals(deals);
      } else {
        localStorage.setItem("timp_deals", JSON.stringify([...deals, newDeal]));
      }

      const f = (fileEl && fileEl.files && fileEl.files[0]) ? fileEl.files[0] : null;
      if(f){
        const map = getDealBooks();
        map[id] = f.name;
        saveDealBooks(map);
      }

      setToast("Submitted", "Opportunity submitted (Pending). Admin can review and publish.");
      renderOpps();
    }

      const name = b.catalog_name || b.catalog || "";

      if(!data){

          <h2>Search Region Profiles</h2>
          <p style="color:var(--muted); margin-top:6px;">Search by country, sector, tags, or keywords.</p>

          <input id="rpSearchInput" placeholder="Search (e.g., Kenya, energy, logistics)" style="width:100%" />
          <div style="height:10px"></div>

          <label>Region</label>
          <select id="rpRegionFilter" style="width:100%">
            <option value="all">All</option>
            <option value="north">North</option>
            <option value="west">West</option>
            <option value="central">Central</option>
            <option value="east">East</option>
            <option value="southern">Southern</option>
          </select>

          <div class="hr"></div>
          <div id="rpResults"></div>
        </div>
      `;

      initRegionProfileSearch();
    }

    function setHash(h){ location.hash = h; }

    function route(){
      const h = location.hash || "#events";
      if(h.startsWith("#events")) renderEvents();
      else if(h.startsWith("#dealroom")) renderDealRoom();
      else if(h.startsWith("#opps")) renderOpps();
      else if(h.startsWith("#expo")) renderExpo();
      else if(h.startsWith("#archive")) renderArchive();
      else if(h.startsWith("#regionprofiles")) renderRegionProfilesPublic();
      else if(h.startsWith("#profile")) renderProfile();
      else renderEvents();
    }

    window.addEventListener("hashchange", route);
    route();

  } // end auth skip wrapper
  </script>
