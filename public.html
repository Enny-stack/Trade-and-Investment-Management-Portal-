<!-- public.html (UPDATED: Published Events show Banner in LIST + Banner resolver supports banner_data_url) -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>TIMP – Public Portal</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="topbar">
    <div class="brand">
      <div class="logo"></div>
      <div>
        <div class="i18n" data-key="public">Public Portal</div>
        <span class="sub i18n" data-key="timp">Trade & Investment Management Portal (TIMP)</span>
      </div>
    </div>
    <div class="pills">
      <a class="pill" href="index.html"><small>Home</small></a>
      <div class="pill"><small class="i18n" data-key="region">Region</small>&nbsp;<select id="regionSel"></select></div>
      <div class="pill"><small class="i18n" data-key="language">Language</small>&nbsp;
        <select id="langSel">
          <option value="en">English</option>
          <option value="fr">Français</option>
          <option value="ar">العربية</option>
          <option value="pt">Português</option>
        </select>
      </div>
    </div>
  </div>

  <div class="layout">
    <aside class="sidebar">
      <div class="navtitle">Public</div>
      <nav class="nav" id="sidebarNav">
        <a href="#events" data-nav="events"><span class="i18n" data-key="events">Events</span><span class="badge" id="evCount"></span></a>
        <a href="#dealroom" data-nav="deal_room"><span class="i18n" data-key="deal_room">Deal Room</span><span class="badge" id="matchCount"></span></a>

        <!-- ✅ Region Profiles -->
        <a href="#regionprofiles" data-nav="region_profiles"><span>Region Profiles</span></a>

        <a href="#opps" data-nav="opportunities"><span class="i18n" data-key="opportunities">Opportunities</span></a>
        <a href="#expo" data-nav="exhibition"><span class="i18n" data-key="exhibition">Virtual Exhibition</span></a>
        <a href="#archive" data-nav="archive"><span class="i18n" data-key="archive">Archive</span></a>
        <a href="#profile" data-nav="profile"><span class="i18n" data-key="profile">My Profile</span></a>
      </nav>

      <div class="navtitle">Shortcut</div>
      <nav class="nav">
        <a href="admin.html"><span>Switch to Admin</span><span class="badge">demo</span></a>
        <a href="welcome.html"><span>Demo Script</span></a>

        <!-- ✅ Logout (safe even if auth.js not ready yet) -->
        <a href="#" onclick="(window.TIMP_AUTH && TIMP_AUTH.logout ? TIMP_AUTH.logout() : null); location.href='welcome.html'; return false;">
          <span>Logout</span><span class="badge">demo</span>
        </a>
      </nav>
    </aside>

    <main class="main">
      <div class="hero">
        <h1 id="pageTitle">Events</h1>
        <div class="meta" id="pageMeta"></div>
        <div class="row" id="pageActions"></div>
      </div>

      <div id="pageBody" style="margin-top:14px;"></div>
    </main>
  </div>

  <div class="toast" id="toast">
    <b id="toastTitle"></b>
    <div id="toastMsg"></div>
  </div>

  <!-- =========================================================
       ✅ AUTH GATE MUST LOAD FIRST (BEFORE portal scripts)
       ========================================================= -->
  <script src="auth.js"></script>
  <script>
    (function(){
      try{
        document.documentElement.style.visibility = "hidden";

        if(window.TIMP_AUTH && typeof TIMP_AUTH.requireAuth === "function"){
          const ok = TIMP_AUTH.requireAuth("welcome.html");
          if(!ok){
            return;
          }
        }
        document.documentElement.style.visibility = "";
      }catch(e){
        console.warn("Auth gate warning:", e);
        document.documentElement.style.visibility = "";
      }
    })();
  </script>

  <!-- Only load portal JS after gate -->
  <script src="data.js"></script>
  <script src="util.js"></script>
  <script src="regionStore.js"></script>
  <script src="app.js"></script>

  <!-- ✅ Portal logic -->
  <script>
  if(window.TIMP_AUTH && typeof TIMP_AUTH.isAuthed === "function" && !TIMP_AUTH.isAuthed()){
    console.warn("Not registered yet — skipping public portal init.");
  } else {

    /* =========================================================
       Safer fallbacks
       ========================================================= */
    window.$  = window.$  || function(sel){ return document.querySelector(sel); };
    window.$$ = window.$$ || function(sel){ return Array.from(document.querySelectorAll(sel)); };

    window.setToast = window.setToast || function(title, msg){
      const t = document.getElementById("toast");
      const tt = document.getElementById("toastTitle");
      const tm = document.getElementById("toastMsg");
      if(tt) tt.textContent = title || "";
      if(tm) tm.textContent = msg || "";
      if(t){
        t.classList.add("show");
        setTimeout(()=>t.classList.remove("show"), 2600);
      } else {
        console.log("TOAST:", title, msg);
      }
    };

    window.pickLang = window.pickLang || function(){
      return document.getElementById("langSel")?.value || localStorage.getItem("timp_lang") || "en";
    };
    window.pickRegion = window.pickRegion || function(){
      return document.getElementById("regionSel")?.value || localStorage.getItem("timp_region") || "non_reg";
    };

    window.t = window.t || function(key){
      return String(key || "").replace(/_/g," ").replace(/\b\w/g, c => c.toUpperCase());
    };

    window.regionLabel = window.regionLabel || function(regionId){
      const r = String(regionId || "").toLowerCase();
      const map = { north:"North", west:"West", central:"Central", east:"East", south:"South", southern:"Southern", non_reg:"Non-Regional" };
      return map[r] || regionId || "Region";
    };

    window.filterByRegion = window.filterByRegion || function(items){
      const r = pickRegion();
      if(r === "non_reg") return Array.isArray(items) ? items : [];
      return (Array.isArray(items) ? items : []).filter(x => (x && x.region) ? x.region === r : true);
    };

    window.fmtMoney = window.fmtMoney || function(x){
      const n = Number(x || 0);
      return (n ? (n.toLocaleString() + "m USD") : "0m USD");
    };

    window.badgeWarmth = window.badgeWarmth || function(w){
      const v = String(w || "Warm");
      const cls = v === "Hot" ? "ok" : (v === "Cold" ? "muted" : "warn");
      return `<span class="tag ${cls}">${v}</span>`;
    };

    function escapeHtml(s){
      return String(s || "").replace(/[&<>"']/g, m => ({
        "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
      }[m]));
    }

    /* =========================================================
       ✅ Metrics (demo)
       ========================================================= */
    const METRIC_EVENTS_KEY = "timp_metric_events";
    function logMetric(name, payload){
      try{
        const rows = JSON.parse(localStorage.getItem(METRIC_EVENTS_KEY) || "[]");
        rows.push({ id:"m"+Date.now(), name, payload: payload || {}, at:new Date().toISOString() });
        localStorage.setItem(METRIC_EVENTS_KEY, JSON.stringify(rows));
      }catch(e){}
    }

    // -----------------------------
    // Helpers + Safe storage
    // -----------------------------
    let OPEN_EVENT_ID = null;
    let OPEN_DEAL_ID = null;

    function safeEvents(){
      return (typeof getEvents === "function") ? getEvents() : ((window.TIMP_DATA && TIMP_DATA.events) || []);
    }
    function safeDeals(){
      return (typeof getDeals === "function") ? getDeals() : ((window.TIMP_DATA && TIMP_DATA.deals) || []);
    }

    window.getEvents = window.getEvents || function(){
      try{
        const x = JSON.parse(localStorage.getItem("timp_events") || "null");
        if(Array.isArray(x)) return x;
      }catch(e){}
      return ((window.TIMP_DATA && TIMP_DATA.events) || []);
    };

    window.getDeals = window.getDeals || function(){
      try{
        const x = JSON.parse(localStorage.getItem("timp_deals") || "null");
        if(Array.isArray(x)) return x;
      }catch(e){}
      return ((window.TIMP_DATA && TIMP_DATA.deals) || []);
    };

    window.saveDeals = window.saveDeals || function(rows){
      localStorage.setItem("timp_deals", JSON.stringify(rows || []));
    };

    window.getBooths = window.getBooths || function(){
      try{
        const x = JSON.parse(localStorage.getItem("timp_booths") || "null");
        if(Array.isArray(x)) return x;
      }catch(e){}
      return ((window.TIMP_DATA && TIMP_DATA.booths) || []);
    };

    function safeBooths(){
      return (typeof getBooths === "function") ? getBooths() : ((window.TIMP_DATA && TIMP_DATA.booths) || []);
    }

    function downloadDataUrl(dataUrl, filename){
      if(!dataUrl) return;
      const a = document.createElement("a");
      a.href = dataUrl;
      a.download = filename || "download";
      a.click();
    }

    // =========================================================
    // ✅ Project Proposal Template download
    // =========================================================
    function getProposalTemplateMeta(){
      const lang =
        (typeof pickLang === "function" ? pickLang() : (document.getElementById("langSel")?.value || "en"));

      const urlMap = {
        en: "assets/project-proposal-template-en.pdf",
        fr: "assets/project-proposal-template-fr.pdf",
        ar: "assets/project-proposal-template-en.pdf",
        pt: "assets/project-proposal-template-en.pdf"
      };

      const labelMap = {
        en: "Download Project Proposal Template (Deal Book)",
        fr: "Télécharger le modèle de proposition (Deal Book)",
        ar: "تحميل نموذج مقترح المشروع (Deal Book)",
        pt: "Baixar modelo de proposta (Deal Book)"
      };

      const url = urlMap[lang] || urlMap.en;

      return {
        lang,
        url,
        label: labelMap[lang] || labelMap.en,
        filename: url.split("/").pop() || "project-proposal-template.pdf"
      };
    }

    function downloadProposalTemplate(){
      const tpl = getProposalTemplateMeta();
      const a = document.createElement("a");
      a.href = tpl.url;
      a.download = tpl.filename;
      a.target = "_blank";
      document.body.appendChild(a);
      a.click();
      a.remove();
      logMetric("proposal_template_download", { lang: tpl.lang, url: tpl.url });
    }

    // ✅ Public download: Prospectus for a deal
    function downloadDealProspectus(dealId){
      const d = safeDeals().find(x => x.id === dealId);
      if(!d || !d.prospectus_name){
        return setToast("No prospectus", "This deal has no prospectus attached yet.");
      }
      if(!d.prospectus_data){
        return setToast("Demo limit", "Prospectus name exists, but PDF data wasn’t stored (file too large in demo).");
      }
      downloadDataUrl(d.prospectus_data, d.prospectus_name);
      logMetric("prospectus_download", { deal_id: dealId, name: d.prospectus_name });
    }

    function requestProspectus(dealId){
      const d = safeDeals().find(x => x.id === dealId);
      const log = JSON.parse(localStorage.getItem("timp_prospectus_requests") || "[]");
      log.push({
        id: "pr" + Date.now(),
        deal_id: dealId,
        deal_label: d ? `${d.country} • ${d.sector}` : dealId,
        at: new Date().toISOString()
      });
      localStorage.setItem("timp_prospectus_requests", JSON.stringify(log));
      logMetric("prospectus_request", { deal_id: dealId });
      setToast("Requested", "Prospectus request recorded (demo signal).");
    }

    // registrations store
    window.getRegistrations = window.getRegistrations || function(){
      try{
        const x = JSON.parse(localStorage.getItem("timp_regs"));
        if(Array.isArray(x)) return x;
      }catch(e){}
      return ((window.TIMP_DATA && TIMP_DATA.registrations) || []);
    };

    window.saveRegistrations = window.saveRegistrations || function(rows){
      localStorage.setItem("timp_regs", JSON.stringify(rows || []));
    };

    // profile store
    window.getMyProfile = window.getMyProfile || function(){
      try{
        const p = JSON.parse(localStorage.getItem("timp_profile"));
        if(p && typeof p === "object") return p;
      }catch(e){}
      return {
        salutation: "Mr",
        first_name: "",
        last_name: "",
        org: "",
        position: "",
        email: "",
        phone: ""
      };
    };

    window.saveMyProfile = window.saveMyProfile || function(p){
      localStorage.setItem("timp_profile", JSON.stringify(p || {}));
      if(p && p.email) localStorage.setItem("timp_user_email", p.email);
    };

    // compat wrappers
    window.getProfile = window.getProfile || function(){
      const p = getMyProfile();
      return {
        name: `${p.first_name || ""} ${p.last_name || ""}`.trim() || "Demo User",
        org: p.org || "",
        title: p.position || "",
        email: p.email || "",
        phone: p.phone || "",
        salutation: p.salutation || "Mr",
        first_name: p.first_name || "",
        last_name: p.last_name || "",
        position: p.position || ""
      };
    };

    window.saveProfile = window.saveProfile || function(pCompat){
      const prev = getMyProfile();
      const next = {
        salutation: pCompat.salutation || prev.salutation || "Mr",
        first_name: pCompat.first_name || (pCompat.name ? String(pCompat.name).split(" ")[0] : prev.first_name) || "",
        last_name:  pCompat.last_name  || (pCompat.name ? String(pCompat.name).split(" ").slice(1).join(" ") : prev.last_name) || "",
        org: pCompat.org || prev.org || "",
        position: pCompat.position || pCompat.title || prev.position || "",
        email: pCompat.email || prev.email || "",
        phone: pCompat.phone || prev.phone || ""
      };
      saveMyProfile(next);
    };

    /* =========================================================
       Deal book storage
       ========================================================= */
    const DEALBOOK_KEY_V1 = "timp_deal_books_v1";
    const DEALBOOK_KEY_LEGACY = "timp_deal_books";

    function getDealBooks(){
      try{
        const x = JSON.parse(localStorage.getItem(DEALBOOK_KEY_V1) || "null");
        if(x && typeof x === "object") return x;
      }catch(e){}
      try{
        const y = JSON.parse(localStorage.getItem(DEALBOOK_KEY_LEGACY) || "null");
        if(y && typeof y === "object") return y;
      }catch(e){}
      return {};
    }
    function saveDealBooks(obj){
      localStorage.setItem(DEALBOOK_KEY_V1, JSON.stringify(obj || {}));
      try{
        const legacy = {};
        Object.keys(obj || {}).forEach(k=>{
          const v = obj[k];
          legacy[k] = (typeof v === "string") ? v : (v && (v.name || v.filename) ? (v.name || v.filename) : "");
        });
        localStorage.setItem(DEALBOOK_KEY_LEGACY, JSON.stringify(legacy));
      }catch(e){}
    }

    function getDealBookEntry(dealId){
      const map = getDealBooks();
      const v = map ? map[dealId] : null;
      if(!v) return null;
      if(typeof v === "string") return { name: v, data: null };
      if(typeof v === "object") return {
        name: v.name || v.filename || "deal-book.pdf",
        data: v.data || v.dataUrl || null,
        size: v.size || null,
        at: v.at || null
      };
      return null;
    }

    function downloadDealBook(dealId){
      const entry = getDealBookEntry(dealId);
      if(!entry) return setToast("No deal book", "No deal book uploaded for this deal yet.");
      if(!entry.data) return setToast("Demo limit", "Deal book name exists, but PDF data wasn’t stored (file too large in demo).");
      downloadDataUrl(entry.data, entry.name);
      logMetric("deal_book_download", { deal_id: dealId, name: entry.name });
    }

    function isDealVisibleOnPublic(d){
      if(!d || typeof d !== "object") return false;
      if(!("status" in d)) return true;
      return String(d.status || "").toLowerCase() !== "draft";
    }

    function myRegForEvent(eventId){
      const p = getMyProfile();
      const email = String(p.email || localStorage.getItem("timp_user_email") || "").toLowerCase().trim();
      if(!email) return null;
      return getRegistrations().find(r =>
        r.event_id === eventId &&
        String(r.email || "").toLowerCase().trim() === email
      ) || null;
    }

    function regTag(state){
      const raw = String(state || "Pending");
      const s = raw.toLowerCase().trim();
      const cls = (s === "approved") ? "ok" : (s === "pending") ? "warn" : "muted";
      return `<span class="tag ${cls}">${escapeHtml(raw)}</span>`;
    }

    /* =========================================================
       ✅ Virtual Exhibition Inquiries
       ========================================================= */
    const INQUIRIES_KEY = "timp_inquiries";
    function getInquiries(){
      try{
        const x = JSON.parse(localStorage.getItem(INQUIRIES_KEY) || "[]");
        return Array.isArray(x) ? x : [];
      }catch(e){ return []; }
    }
    function saveInquiries(rows){
      localStorage.setItem(INQUIRIES_KEY, JSON.stringify(rows || []));
    }

    function resolveBoothByKey(boothKey){
      const booths = safeBooths();
      if(String(boothKey || "").startsWith("idx_")){
        const idx = parseInt(String(boothKey).replace("idx_",""), 10);
        const b = booths[idx];
        return b ? { booth: b, booth_id: b.id || boothKey } : null;
      }
      const b = booths.find(x => x.id === boothKey);
      return b ? { booth: b, booth_id: b.id || boothKey } : null;
    }

    function sendBoothInquiry(boothKey){
      const res = resolveBoothByKey(boothKey);
      if(!res) return setToast("Not found", "Booth not found (demo).");

      const p = getMyProfile();
      const email = String(p.email || localStorage.getItem("timp_user_email") || "").trim().toLowerCase();
      const name = `${p.first_name||""} ${p.last_name||""}`.trim() || "Public user";

      if(!email){
        return setToast("Profile required", "Please update your Profile (email) before sending an inquiry.");
      }

      const message = prompt(`Send inquiry to ${res.booth.org || "Exhibitor"}:\n\nType your message below:`, "Hello, I would like to learn more about your offers.");
      if(message === null) return;
      const msg = String(message || "").trim();
      if(!msg) return setToast("Empty message", "Please type a message to send.");

      const row = {
        id: "inq" + Date.now(),
        booth_id: res.booth_id,
        booth_org: res.booth.org || "Exhibitor",
        offers: res.booth.offers || "",
        region: pickRegion(),
        from_email: email,
        from_name: name,
        message: msg,
        at: new Date().toISOString(),
        status: "New"
      };

      const rows = getInquiries();
      rows.push(row);
      saveInquiries(rows);

      logMetric("booth_inquiry", { booth_id: row.booth_id, booth_org: row.booth_org, from_email: email });
      setToast("Inquiry sent", "Your inquiry has been recorded and routed to Admin (demo).");
    }

    /* =========================================================
       ✅ Engagement streams (Public writes, Admin reads)
       - Event Chat: timp_event_chat_v1
       - Deal Chat : timp_deal_chat_v1
       ========================================================= */
    const EVENT_CHAT_KEY = "timp_event_chat_v1";
    const DEAL_CHAT_KEY  = "timp_deal_chat_v1";

    function getChat(key){
      try{
        const x = JSON.parse(localStorage.getItem(key) || "[]");
        return Array.isArray(x) ? x : [];
      }catch(e){ return []; }
    }
    function saveChat(key, rows){
      localStorage.setItem(key, JSON.stringify(rows || []));
    }

    function renderChatList(containerId, rows){
      const el = document.getElementById(containerId);
      if(!el) return;

      if(!rows.length){
        el.innerHTML = `<div class="muted"><small>No messages yet.</small></div>`;
        return;
      }

      el.innerHTML = rows
        .slice(-80)
        .map(m=>{
          const who = escapeHtml(m.from_name || m.from_email || "User");
          const when = m.at ? new Date(m.at).toLocaleString() : "";
          const msg = escapeHtml(m.message || "");
          return `
            <div style="padding:10px 0; border-bottom:1px solid rgba(255,255,255,0.06);">
              <div class="mini">
                <div><b>${who}</b></div>
                <div><small class="muted">${escapeHtml(when)}</small></div>
              </div>
              <div style="color:var(--muted); line-height:1.45; margin-top:6px;">${msg}</div>
            </div>
          `;
        })
        .join("");

      el.scrollTop = el.scrollHeight;
    }

    function renderEventChatList(eventId){
      const rows = getChat(EVENT_CHAT_KEY).filter(x => x.event_id === eventId);
      renderChatList("eventChatList", rows);
    }

    function sendEventChat(eventId){
      const p = getMyProfile();
      const email = String(p.email || localStorage.getItem("timp_user_email") || "").trim().toLowerCase();
      const name = `${p.first_name||""} ${p.last_name||""}`.trim() || "Public user";

      if(!email){
        return setToast("Profile required", "Please update your Profile (email) before sending a message.");
      }
      const input = document.getElementById("eventChatInput");
      const msg = String(input?.value || "").trim();
      if(!msg) return setToast("Empty", "Type a message first.");

      const rows = getChat(EVENT_CHAT_KEY);
      rows.push({
        id: "ec" + Date.now(),
        event_id: eventId,
        from_email: email,
        from_name: name,
        message: msg,
        at: new Date().toISOString()
      });
      saveChat(EVENT_CHAT_KEY, rows);

      if(input) input.value = "";
      renderEventChatList(eventId);
      logMetric("event_chat_message", { event_id: eventId, from_email: email });
      setToast("Sent", "Message posted to Event Chat (demo).");
    }

    function renderDealChatList(dealId){
      const rows = getChat(DEAL_CHAT_KEY).filter(x => x.deal_id === dealId);
      renderChatList("dealChatList", rows);
    }

    function sendDealChat(dealId){
      const p = getMyProfile();
      const email = String(p.email || localStorage.getItem("timp_user_email") || "").trim().toLowerCase();
      const name = `${p.first_name||""} ${p.last_name||""}`.trim() || "Public user";

      if(!email){
        return setToast("Profile required", "Please update your Profile (email) before sending a message.");
      }
      const input = document.getElementById("dealChatInput");
      const msg = String(input?.value || "").trim();
      if(!msg) return setToast("Empty", "Type a message first.");

      const rows = getChat(DEAL_CHAT_KEY);
      rows.push({
        id: "dc" + Date.now(),
        deal_id: dealId,
        from_email: email,
        from_name: name,
        message: msg,
        at: new Date().toISOString()
      });
      saveChat(DEAL_CHAT_KEY, rows);

      if(input) input.value = "";
      renderDealChatList(dealId);
      logMetric("deal_chat_message", { deal_id: dealId, from_email: email });
      setToast("Sent", "Message posted to Investment Hub (demo).");
    }

    /* =========================================================
       Deal Details View
       ========================================================= */
    function openDealDetails(dealId, backHash){
      OPEN_DEAL_ID = dealId;

      const d = safeDeals().find(x => x.id === dealId);
      if(!d) return setToast("Not found", "Deal not found.");

      const back = backHash || "#dealroom";
      if(back.startsWith("#opps")) setActive("opportunities"); else setActive("deal_room");

      const status = d.status ? `<span class="tag ${String(d.status).toLowerCase()==='published' ? 'ok' : 'warn'}">${escapeHtml(d.status)}</span>` : "";
      const region = regionLabel(d.region || pickRegion());
      const book = getDealBookEntry(dealId);

      const prospectusBlock = d.prospectus_name
        ? `
          <div class="row-actions">
            <button class="secondary" onclick="downloadDealProspectus('${d.id}')">Download Prospectus</button>
            <button class="secondary" onclick="requestProspectus('${d.id}')">Request (signal)</button>
          </div>
        `
        : `
          <div class="row-actions">
            <button class="secondary" onclick="requestProspectus('${d.id}')">Request Prospectus</button>
          </div>
        `;

      const bookBlock = book
        ? `
          <p style="margin:0 0 8px 0;"><b>Deal Book:</b> ${escapeHtml(book.name)}</p>
          <div class="row-actions">

    function updateRegStatus(){
      if(!window.CURRENT_EVENT_ID) return;
      const regs = getRegistrations();
      const email = ($("#regEmail")?.value || localStorage.getItem("timp_user_email") || "").trim().toLowerCase();
      const r = regs.find(x =>
        x.event_id === window.CURRENT_EVENT_ID &&

      );
      if($("#regStatus")){
        $("#regStatus").innerHTML = r

    function registerForEvent(eventId){
      const id = eventId || window.CURRENT_EVENT_ID;
      if(!id) return setToast("Missing event", "Open an event first.");

      const events = safeEvents();
      const ev = events.find(e=>e.id===id);
      if(!ev) return setToast("Missing event", "Event not found.");

      const reg = {
        id: "r" + Date.now(),
        event_id: ev.id,
        region: ev.region,
        state: "Pending",

        salutation: ($("#regSalutation").value || "Mr").trim(),
        first_name: ($("#regFirst").value || "").trim(),
        last_name: ($("#regLast").value || "").trim(),
        org: ($("#regOrg").value || "").trim(),
        position: ($("#regPosition").value || "").trim(),
        email: ($("#regEmail").value || "").trim(),
        phone: ($("#regPhone").value || "").trim(),
        submitted_at: new Date().toISOString()
      };

      if(!reg.first_name || !reg.last_name || !reg.org || !reg.position || !reg.email){
        return setToast("Missing fields", "Fill First name, Last name, Organisation, Position, and Email.");
      }

      saveMyProfile({
        salutation: reg.salutation,
        first_name: reg.first_name,
        last_name: reg.last_name,
        org: reg.org,
        position: reg.position,
        email: reg.email,
        phone: reg.phone
      });

      const regs = getRegistrations();

      const exists = regs.find(x =>
        x.event_id===reg.event_id &&
        String(x.email||"").toLowerCase().trim()===reg.email.toLowerCase().trim()
      );

      if(exists){
        setToast("Already registered", "You already registered for this event. Check your status below.");
        updateRegStatus();
        return;
      }

      regs.push(reg);
      saveRegistrations(regs);

      logMetric("event_registration_submitted", { event_id: reg.event_id, email: reg.email });
      setToast("Submitted", "Registration saved. Admin can now Approve/Reject.");
      updateRegStatus();
    }

    // -----------------------------
    // ✅ Event banner resolver (UPDATED)
    // - now supports banner_data_url (your Admin publish banner field)
    // -----------------------------
    function resolveEventBanner(ev){
      if(!ev || typeof ev !== "object") return null;

      const raw =
        ev.banner_data_url || ev.bannerDataUrl ||   /* ✅ NEW */
        ev.banner_data || ev.bannerData ||
        ev.banner_url || ev.bannerUrl ||
        ev.banner ||
        ev.image || ev.image_url || ev.imageUrl || null;

      if(!raw) return null;
      const s = String(raw);

      // dataURL or http(s) or relative
      if(s.startsWith("data:")) return s;
      if(s.startsWith("http://") || s.startsWith("https://")) return s;
      if(s.startsWith("./") || s.startsWith("/") || s.includes("assets/")) return s;

      // filename only → assume assets/events/
      if(/\.(png|jpg|jpeg|webp|gif)$/i.test(s)) return "assets/events/" + s;

      return null;
    }

      const deals = filterByRegion(safeDeals()).filter(isDealVisibleOnPublic);
      const rows = deals.map(d=>{
        const book = getDealBookEntry(d.id);
        const bookTag = book ? `<small class="tag ok">Deal book: ${escapeHtml(book.name)}</small>` : `<small class="tag muted">No deal book uploaded</small>`;
        const status = d.status ? `<span class="tag ${String(d.status).toLowerCase()==='published'?'ok':'warn'}">${escapeHtml(d.status)}</span>` : "";

        return `
          <tr>
            <td>
              <b>${escapeHtml(d.country)}</b> ${status}<br>
              <small>${escapeHtml(d.sector)}</small><br>
              ${bookTag}
            </td>
            <td>${escapeHtml(fmtMoney(d.ticket_usd_m))}</td>
            <td>${escapeHtml(d.stage)}</td>
            <td>${badgeWarmth(d.warmth)}</td>
            <td class="row-actions">
              <button class="secondary" onclick="openDealDetails('${d.id}', '#opps')">Open</button>
              <button class="secondary" onclick="requestProspectus('${d.id}')">Request</button>
            </td>
          </tr>
        `;
      }).join("");

      $("#pageBody").innerHTML = `
        <div class="grid cols-2">
          <div class="card">
            <h2>Submit an Opportunity (Public demo)</h2>

            <div class="row-actions" style="margin:8px 0 10px 0;">
              <button class="secondary" onclick="downloadProposalTemplate()">${escapeHtml(tpl.label)}</button>
            </div>

            <p>Public users can submit an opportunity + upload a deal pack. In the real build, Admin reviews and publishes.</p>
            <div class="hr"></div>

            <label>Country</label>
            <input id="subCountry" placeholder="e.g., Nigeria" style="width:100%" />
            <div style="height:10px"></div>

            <label>Sector</label>
            <input id="subSector" placeholder="e.g., Energy" style="width:100%" />
            <div style="height:10px"></div>

            <label>Ticket size (USD millions)</label>
            <input id="subTicket" type="number" min="1" step="1" placeholder="e.g., 80" style="width:100%" />
            <div style="height:10px"></div>

            <label>Stage</label>
            <select id="subStage" style="width:100%">
              <option>Origination</option>
              <option>Screening</option>
              <option>Due Diligence</option>
              <option>Term Sheet</option>
              <option>Approved</option>
              <option>Disbursed</option>
            </select>
            <div style="height:10px"></div>

            <label>Short summary (max 500 chars)</label>
            <textarea id="subSummary" rows="4" maxlength="500" placeholder="Describe the opportunity..." style="width:100%"></textarea>
            <div style="height:10px"></div>

            <label>Deal book / deal pack (PDF) – demo upload</label>
            <input id="subFile" type="file" accept=".pdf" />
            <div class="hr"></div>

            <button onclick="submitOpportunity()">Submit</button>
            <button class="secondary" onclick="setToast('Workflow', 'Demo: submission saved locally; Admin reviews and sets Published.')">How it works</button>
          </div>

          <div class="card">
            <h2>African Investments Dashboard (demo)</h2>
            <p>Tracks project status, sector, funding requirements, and investor “warmth” signals.</p>
            <table class="table">
              <thead><tr><th>Deal</th><th>Ticket</th><th>Stage</th><th>Lead</th><th>Actions</th></tr></thead>
              <tbody>${rows || `<tr><td colspan="5"><small>No opportunities for this region yet.</small></td></tr>`}</tbody>
            </table>
          </div>
        </div>
      `;
    }

    function submitOpportunity(){
      const country = ($("#subCountry").value || "").trim();
      const sector = ($("#subSector").value || "").trim();
      const ticket = parseInt($("#subTicket").value || "0", 10);
      const stage = $("#subStage").value;
      const summary = ($("#subSummary").value || "").trim();
      const fileEl = $("#subFile");

      if(!country || !sector || !ticket){
        setToast("Missing fields", "Country, sector, and ticket size are required.");
        return;
      }

      const deals = safeDeals();
      const id = "d" + Date.now();

      const newDeal = {
        id,
        region: pickRegion(),
        country,
        sector,
        ticket_usd_m: ticket,
        stage,
        warmth: "Warm",
        owner: "Public submission",
        summary,
        video: "Deal pack (demo)",
        status: "Pending"
      };

      deals.push(newDeal);
      saveDeals(deals);

      const f = (fileEl && fileEl.files && fileEl.files[0]) ? fileEl.files[0] : null;
      if(f){
        const map = getDealBooks();
        const MAX = 2 * 1024 * 1024;

        map[id] = { name: f.name, size: f.size, type: f.type, at: new Date().toISOString() };
        saveDealBooks(map);

        if(f.size <= MAX){
          const fr = new FileReader();
          fr.onload = ()=>{
            const updated = getDealBooks();
            updated[id] = { name: f.name, size: f.size, type: f.type, at: new Date().toISOString(), data: fr.result };
            saveDealBooks(updated);
            setToast("Uploaded", "Deal book attached (demo).");
            renderOpps();
          };
          fr.onerror = ()=>{
            setToast("Uploaded (name only)", "Could not store PDF data. Filename saved.");
          };
          fr.readAsDataURL(f);
        } else {
          setToast("Uploaded (name only)", "PDF is large for demo storage. Filename saved; Admin can replace with hosted file in real build.");
        }
      }

      logMetric("opportunity_submitted", { deal_id: id, country, sector, ticket_usd_m: ticket, stage });
      setToast("Submitted", "Opportunity submitted (Pending). Admin can review and publish.");
      renderOpps();
    }

    // -----------------------------
    // EXHIBITION
    // -----------------------------
    function isBoothVisibleOnPublic(b){
      if(!b || typeof b !== "object") return false;
      if(!("status" in b)) return true;
      return String(b.status || "").toLowerCase() !== "draft";
    }

    function viewBoothCatalog(boothKey){
      const booths = safeBooths();
      let b = null;

      if(String(boothKey || "").startsWith("idx_")){
        const idx = parseInt(String(boothKey).replace("idx_",""), 10);
        b = booths[idx];
      } else {
        b = booths.find(x => x.id === boothKey);
      }

      if(!b) return setToast("Not found", "Booth not found (demo).");

      const name = b.catalog_name || b.catalog || "";
      const data = b.catalog_data || "";

      if(!name){
        return setToast("No catalog", "This booth has no catalog attached yet.");
      }
      if(!data){
        return setToast("Demo limit", "Catalog name exists, but PDF data wasn’t stored (file too large in demo).");
      }
      downloadDataUrl(data, name);
      logMetric("booth_catalog_download", { booth_id: b.id || boothKey, name });
    }

    function renderExpo(){
      setActive("exhibition");
      $("#pageTitle").textContent = t("exhibition");
      $("#pageMeta").innerHTML = `<span class="tag ok">${escapeHtml(regionLabel(pickRegion()))}</span> <span class="tag muted">Persistent digital stands (demo)</span>`;
      $("#pageActions").innerHTML = ``;

      const boothsRaw = filterByRegion(safeBooths()).filter(isBoothVisibleOnPublic);

      const cards = boothsRaw.map((b,i)=>{
        const key = b.id ? b.id : ("idx_" + i);
        const catalogLabel = b.catalog_name || b.catalog || "Not attached";
        const offersLabel = b.offers || "";

        return `
          <div class="card">
            <h3>${escapeHtml(b.org || "Exhibitor")}</h3>
            <p><b>Catalog:</b> ${escapeHtml(catalogLabel)}<br><b>Offers:</b> ${escapeHtml(offersLabel)}</p>
            <div class="row-actions">
              <button class="secondary" onclick="viewBoothCatalog('${key}')">View catalog</button>
              <button onclick="sendBoothInquiry('${key}')">Send inquiry</button>
            </div>
            <small class="muted">Inquiries are stored in <b>${INQUIRIES_KEY}</b> for Admin notifications.</small>
          </div>
        `;
      }).join("");

      $("#pageBody").innerHTML = `<div class="grid cols-2">${cards || `<div class="card"><small>No booths for this region in demo.</small></div>`}</div>`;
    }

    // -----------------------------
    // ARCHIVE
    // -----------------------------
    function renderArchive(){
      setActive("archive");
      $("#pageTitle").textContent = t("archive");
      $("#pageMeta").innerHTML = `<span class="tag ok">Audit-ready</span> <span class="tag muted">Search events and deals (demo)</span>`;
      $("#pageActions").innerHTML = ``;

      $("#pageBody").innerHTML = `
        <div class="grid cols-2">
          <div class="card">
            <h2>Search</h2>
            <input id="q" placeholder="Search keywords (e.g., Kenya, Energy, Roadshow)" style="width:100%" />
            <div style="height:10px"></div>
            <button onclick="doSearch()">Search</button>
            <div class="hr"></div>
            <div id="results"><small>Try “Kenya” or “Energy”.</small></div>
          </div>
          <div class="card">
            <h2>Archive Contents</h2>
            <ul style="margin:0; padding-left:18px; color:var(--muted); line-height:1.55">
              <li>Past event profiles + attendee lists</li>
              <li>Agendas, slide decks, recordings</li>
              <li>Deal Books + investor engagement outputs</li>
              <li>Feedback submissions + analytics exports</li>
            </ul>
          </div>
        </div>
      `;
    }

    function doSearch(){
      const q = ($("#q").value || "").toLowerCase().trim();
      const hits = [];

      const evs = filterByRegion(safeEvents())
        .filter(e => String(e?.status || "").toLowerCase().trim() === "published");

      evs.forEach(e=>{
        if([e.title,e.theme,e.venue,e.type,e.date].join(" ").toLowerCase().includes(q)){
          hits.push({type:"Event", label:e.title+" • "+e.date});
        }
      });

      const deals = filterByRegion(safeDeals()).filter(isDealVisibleOnPublic);
      deals.forEach(d=>{
        if([d.country,d.sector,(d.summary||""),d.stage,(d.status||"")].join(" ").toLowerCase().includes(q)){
          hits.push({type:"Deal", label:d.country+" • "+d.sector+" • "+fmtMoney(d.ticket_usd_m)});
        }
      });

      $("#results").innerHTML = hits.length
        ? `<ul style="margin:0; padding-left:18px; color:var(--muted); line-height:1.55">${hits.map(h=>`<li><b>${escapeHtml(h.type)}:</b> ${escapeHtml(h.label)}</li>`).join("")}</ul>`
        : `<small>No results.</small>`;
    }

    // -----------------------------
    // PROFILE
    // -----------------------------
    function renderProfile(){
      setActive("profile");
      $("#pageTitle").textContent = t("profile");
      $("#pageMeta").innerHTML = `<span class="tag ok">Verified user (demo)</span> <span class="tag muted">Amend profile</span>`;
      $("#pageActions").innerHTML = ``;

      const p = getMyProfile();

      $("#pageBody").innerHTML = `
        <div class="grid cols-2">
          <div class="card">
            <h2>Profile</h2>

            <label>Salutation</label>
            <select id="pSalutation" style="width:100%">
              <option ${p.salutation==="Mr"?"selected":""}>Mr</option>
              <option ${p.salutation==="Mrs"?"selected":""}>Mrs</option>
              <option ${p.salutation==="Ms"?"selected":""}>Ms</option>
              <option ${p.salutation==="Dr"?"selected":""}>Dr</option>
            </select>
            <div style="height:10px"></div>

            <div class="grid cols-2">
              <div><label>First name</label><input id="pFirst" value="${escapeHtml(p.first_name||"")}" style="width:100%" /></div>
              <div><label>Last name</label><input id="pLast" value="${escapeHtml(p.last_name||"")}" style="width:100%" /></div>
            </div>

            <div style="height:10px"></div>
            <label>Organisation</label><input id="pOrg" value="${escapeHtml(p.org||"")}" style="width:100%" />
            <div style="height:10px"></div>

            <label>Position</label><input id="pPosition" value="${escapeHtml(p.position||"")}" style="width:100%" />
            <div style="height:10px"></div>

            <label>Email</label><input id="pEmail" value="${escapeHtml(p.email||"")}" style="width:100%" />
            <div style="height:10px"></div>

            <label>Phone</label><input id="pPhone" value="${escapeHtml(p.phone||"")}" style="width:100%" />
            <div style="height:10px"></div>

            <button onclick="savePublicProfile()">Save</button>
            <div class="hr"></div>
            <small>Registrations and inquiries use this profile (demo).</small>
          </div>

          <div class="card">
            <h2>Notifications</h2>
            <p>Automated alerts when new materials, recordings, or deal packs are published.</p>
            <div class="hr"></div>
            <label><input type="checkbox" checked /> Event reminders</label><br>
            <label><input type="checkbox" checked /> New recordings/presentations</label><br>
            <label><input type="checkbox" checked /> Deal book updates</label><br>
            <label><input type="checkbox" /> Matchmaking suggestions</label><br>
          </div>
        </div>
      `;
    }

    function savePublicProfile(){
      const p = {
        salutation: ($("#pSalutation").value || "Mr").trim(),
        first_name: ($("#pFirst").value || "").trim(),
        last_name: ($("#pLast").value || "").trim(),
        org: ($("#pOrg").value || "").trim(),
        position: ($("#pPosition").value || "").trim(),
        email: ($("#pEmail").value || "").trim(),
        phone: ($("#pPhone").value || "").trim()
      };
      saveMyProfile(p);
      setToast("Saved", "Profile saved (demo).");
      logMetric("profile_saved", { email: p.email || "" });
    }

    // -----------------------------
    // REGION PROFILES PAGE (Public)
    // -----------------------------
    function renderRegionProfilesPublic(){
      setActive("region_profiles");
      $("#pageTitle").textContent = "Region Profiles";
      $("#pageMeta").innerHTML = `<span class="tag ok">${escapeHtml(regionLabel(pickRegion()))}</span> <span class="tag muted">Market intelligence & investment insights</span>`;
      $("#pageActions").innerHTML = `<button class="secondary" onclick="setToast('Note', 'Only published region profiles appear here (demo).')">Info</button>`;

      $("#pageBody").innerHTML = `
        <div class="card">
          <h2>Search Region Profiles</h2>
          <p style="color:var(--muted); margin-top:6px;">Search by country, sector, tags, or keywords.</p>

          <input id="rpSearchInput" placeholder="Search (e.g., Kenya, energy, logistics)" style="width:100%" />
          <div style="height:10px"></div>

          <label>Region</label>
          <select id="rpRegionFilter" style="width:100%">
            <option value="all">All</option>
            <option value="north">North</option>
            <option value="west">West</option>
            <option value="central">Central</option>
            <option value="east">East</option>
            <option value="southern">Southern</option>
            <option value="south">South</option>
          </select>

          <div class="hr"></div>
          <div id="rpResults"></div>
        </div>
      `;

      // region profile search functions are in your existing code; keep as-is in your original file
      if(typeof initRegionProfileSearch === "function") initRegionProfileSearch();
    }

    function setHash(h){ location.hash = h; }

    function route(){
      const h = location.hash || "#events";
      if(h.startsWith("#events")) renderEvents();
      else if(h.startsWith("#dealroom")) renderDealRoom();
      else if(h.startsWith("#opps")) renderOpps();
      else if(h.startsWith("#expo")) renderExpo();
      else if(h.startsWith("#archive")) renderArchive();
      else if(h.startsWith("#regionprofiles")) renderRegionProfilesPublic();
      else if(h.startsWith("#profile")) renderProfile();
      else renderEvents();
    }

    window.addEventListener("hashchange", route);
    route();

    // ✅ Export handlers so inline onclick works reliably
    Object.assign(window, {
      openEvent,
      renderEvents,
      renderDealRoom,
      renderOpps,
      renderExpo,
      renderArchive,
      renderProfile,
      renderRegionProfilesPublic,
      openDealDetails,
      schedule,
      renderPitching,
      startTimer,
      resetTimer,
      registerForEvent,
      submitOpportunity,
      doSearch,
      savePublicProfile,
      setHash,
      downloadProposalTemplate,
      downloadDealProspectus,
      requestProspectus,
      downloadDealBook,
      viewBoothCatalog,
      sendBoothInquiry,
      sendEventChat,
      sendDealChat,
      renderEventChatList,
      renderDealChatList
    });

  }
